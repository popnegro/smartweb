<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTaxi - Base Design System</title>
    <style>
        :root {
            --primary-black: #000000;
            --primary-white: #ffffff;
            --accent-green: #05a357;
            --gray-100: #f6f6f6;
            --gray-200: #eeeeee;
            --gray-500: #545454;
            --shadow: 0px 4px 16px rgba(0, 0, 0, 0.12);
            --transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Uber Move Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: transparent;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            height: 100vh;
            padding: 20px;
        }

        /* FAB - Floating Action Button */
        .base-fab {
            background: var(--primary-black);
            color: var(--primary-white);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            z-index: 100;
        }
        .base-fab:hover { transform: scale(1.05); }
        .base-fab svg { width: 24px; height: 24px; fill: currentColor; }

        /* Widget Panel */
        .base-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            background: var(--primary-white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 101;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .base-panel.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        /* Header */
        .base-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .base-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; }

        /* Steps & Content */
        .base-content { padding: 20px; }
        .base-step { display: none; }
        .base-step.active { display: block; animation: fadeIn 0.4s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inputs - Base Design Style */
        .base-field { margin-bottom: 16px; position: relative; }
        .base-input {
            width: 100%;
            height: 48px;
            background: var(--gray-100);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 16px;
            color: var(--primary-black);
            transition: var(--transition);
        }
        .base-input:focus {
            background: var(--primary-white);
            border-color: var(--primary-black);
            outline: none;
        }

        /* Button - Base UI Primary */
        .base-button {
            width: 100%;
            height: 54px;
            background: var(--primary-black);
            color: var(--primary-white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .base-button:hover { opacity: 0.9; }
        .base-button:disabled { background: var(--gray-200); color: var(--gray-500); }

        /* Map Placeholder */
        #base-map {
            width: 100%;
            height: 160px;
            background: #e5e5e5;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }

        /* Summary Item */
        .summary-card {
            background: var(--gray-100);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .price-total {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <button class="base-fab" id="fabToggle">
        <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.19c-.31.17-.69.17-1 0l-7.97-4.19c-.32-.17-.53-.5-.53-.88V7.5c0-.38.21-.71.53-.88l7.97-4.19c.31-.17.69-.17 1 0l7.97 4.19c.32.17.53.5.53.88v9z"/></svg>
    </button>

    <div class="base-panel" id="mainPanel">
        <div class="base-header">
            <h2 id="headerTitle">Solicitar Viaje</h2>
            <button class="close-btn" id="closePanel">✕</button>
        </div>

        <div class="base-content">
            <div class="base-step active" id="step1">
                <div class="base-field">
                    <input type="text" class="base-input" id="in-origen" placeholder="📍 Punto de partida">
                </div>
                <div class="base-field">
                    <input type="text" class="base-input" id="in-destino" placeholder="🏁 ¿A dónde vas?">
                </div>
                <button class="base-button" onclick="nextStep(2)">Ver precios</button>
            </div>

            <div class="base-step" id="step2">
                <div id="base-map">Calculando ruta optimizada...</div>
                <div class="base-field">
                    <input type="text" class="base-input" id="in-nombre" placeholder="👤 Nombre del pasajero">
                </div>
                <button class="base-button" onclick="nextStep(3)">Confirmar detalles</button>
            </div>

            <div class="base-step" id="step3">
                <div class="summary-card">
                    <div class="summary-row"><span>Origen</span><strong id="sum-orig">-</strong></div>
                    <div class="summary-row"><span>Destino</span><strong id="sum-dest">-</strong></div>
                    <div class="price-total" id="sum-price">$0.00</div>
                </div>
                <button class="base-button" style="background: var(--accent-green);" onclick="sendOrder()">Confirmar con WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const fab = document.getElementById('fabToggle');
        const panel = document.getElementById('mainPanel');
        const close = document.getElementById('closePanel');
        
        // UI Logic
        fab.onclick = () => {
            panel.classList.add('active');
            fab.style.display = 'none';
        };

        close.onclick = () => {
            panel.classList.remove('active');
            fab.style.display = 'flex';
        };

        function nextStep(n) {
            document.querySelectorAll('.base-step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            
            if(n === 3) {
                document.getElementById('sum-orig').innerText = document.getElementById('in-origen').value || 'Centro';
                document.getElementById('sum-dest').innerText = document.getElementById('in-destino').value || 'Aeropuerto';
                document.getElementById('sum-price').innerText = '$' + (Math.floor(Math.random() * 1000) + 500);
                document.getElementById('headerTitle').innerText = 'Resumen del viaje';
            }
        }

        function sendOrder() {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            alert("Pedido enviado a las " + time + " via WhatsApp");
        }
    </script>
</body>
</html>
