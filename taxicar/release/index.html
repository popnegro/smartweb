<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Mendoza - Cotizador Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .step-hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-fav { @apply text-[10px] font-bold bg-gray-50 border border-gray-200 px-3 py-2 rounded-xl hover:bg-yellow-50 hover:border-yellow-300 transition-all shadow-sm whitespace-nowrap; }
        #map { filter: rounded-3xl; z-index: 1; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
        
        <header id="main-header" class="bg-yellow-400 p-6 transition-all duration-700">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="font-black text-xl flex items-center gap-2 tracking-tighter">
                        <i data-lucide="taxi" class="w-6 h-6"></i> CENTRAL MENDOZA
                    </h2>
                    <p id="header-status" class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Nueva Solicitud</p>
                </div>
                <div class="flex gap-1.5" id="step-dots">
                    <div class="w-2.5 h-1.5 rounded-full bg-black transition-all duration-300"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-black/20 transition-all duration-300"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-black/20 transition-all duration-300"></div>
                </div>
            </div>
        </header>

        <div class="p-8">
            <div id="step-1" class="fade-in space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Tu Nombre</label>
                    <input type="text" id="userName" placeholder="¿A quién buscamos?" 
                        class="w-full mt-1 px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none font-semibold">
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Origen (GPS)</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="origin" placeholder="Calle y número" 
                            class="flex-1 px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium">
                        <button onclick="detectLocation()" class="bg-black text-white p-4 rounded-2xl hover:bg-slate-800 transition-transform active:scale-90">
                            <i data-lucide="locate" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Destino (Mendoza)</label>
                    <input type="text" id="destination" oninput="searchMza(this.value)" placeholder="¿A dónde vas?" 
                        class="w-full mt-1 px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium">
                    <div id="search-results" class="absolute w-full bg-white shadow-2xl rounded-2xl mt-2 hidden z-50 border border-slate-100 max-h-48 overflow-y-auto"></div>
                </div>

                <div class="py-2">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-3 ml-1 tracking-widest">Destinos Frecuentes</p>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="quickDest('Aeropuerto Mendoza')" class="btn-fav">✈️ Aeropuerto</button>
                        <button onclick="quickDest('Terminal de Mendoza')" class="btn-fav">🚌 Terminal</button>
                        <button onclick="quickDest('Plaza Independencia')" class="btn-fav">🌳 Pza. Independencia</button>
                        <button onclick="quickDest('Palmares Open Mall')" class="btn-fav">🛍️ Palmares</button>
                        <button onclick="quickDest('Arístides Villanueva')" class="btn-fav">🍻 Arístides</button>
                        <button onclick="quickDest('Parque General San Martín')" class="btn-fav">🏞️ Pque. San Martín</button>
                        <button onclick="quickDest('Mendoza Plaza Shopping')" class="btn-fav">🏬 Shopping</button>
                    </div>
                </div>

                <button onclick="toStep2()" class="w-full bg-black text-white font-black py-5 rounded-[1.5rem] shadow-xl hover:shadow-yellow-100 transition-all uppercase tracking-widest text-xs">
                    Cotizar Trayecto
                </button>
            </div>

            <div id="step-2" class="step-hidden fade-in space-y-6">
                <div class="text-center bg-slate-50 py-4 rounded-3xl border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tarifa Estimada</p>
                    <h3 id="price-tag" class="text-5xl font-black text-slate-900 my-1">$0</h3>
                    <p class="text-[10px] font-bold text-green-600 uppercase italic">Confirmación en 2 min</p>
                </div>

                <div id="map" class="w-full h-56 bg-slate-100 rounded-[2rem] border-4 border-white shadow-lg"></div>

                <button onclick="toStep3()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-[1.5rem] shadow-xl hover:bg-[#1faa52] transition-all flex items-center justify-center gap-3">
                    PEDIR POR WHATSAPP <i data-lucide="message-circle" class="fill-white"></i>
                </button>
                <button onclick="changeStep(1)" class="w-full text-slate-400 text-[10px] font-black uppercase tracking-widest">Modificar datos</button>
            </div>

            <div id="step-3" class="step-hidden fade-in text-center py-4">
                <div class="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="check-circle" class="w-12 h-12 text-green-600"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-900">¡Pedido Enviado!</h3>
                <p class="text-slate-500 text-sm mt-2 mb-10 px-4 leading-relaxed">
                    Hemos enviado tu ubicación a la central. Por favor, no cierres WhatsApp para recibir los datos del móvil.
                </p>
                
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="shareTrip()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg">
                        <i data-lucide="share-2" class="w-5 h-5"></i> COMPARTIR TRAYECTO
                    </button>
                    <a href="https://search.google.com/local/writereview?placeid=TU_GOOGLE_ID" target="_blank" class="w-full bg-white border-2 border-yellow-400 text-slate-900 font-black py-4 rounded-2xl flex items-center justify-center gap-2">
                        <i data-lucide="google" class="w-5 h-5"></i> OPINAR EN GOOGLE
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let map, polyline, userData = {};

        // 1. FUNCIÓN CACHE (LocalStorage)
        window.onload = () => {
            const saved = localStorage.getItem('taxi_mza_user');
            if (saved) document.getElementById('userName').value = saved;
        };

        // 2. GEOLOCALIZACIÓN NATIVA
        async function detectLocation() {
            const originInput = document.getElementById('origin');
            originInput.value = "Localizando...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                // Reverse Geocoding con Nominatim
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                originInput.value = data.address.road || data.display_name.split(',')[0];
                userData.startCoords = [latitude, longitude];
            }, () => {
                originInput.value = "";
                alert("Activa el GPS para localizarte automáticamente.");
            });
        }

        // 3. BÚSQUEDA INTELIGENTE MENDOZA
        async function searchMza(query) {
            const resBox = document.getElementById('search-results');
            if (query.length < 3) { resBox.classList.add('hidden'); return; }

            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}, Mendoza, Argentina&limit=4`);
            const data = await response.json();
            
            resBox.innerHTML = '';
            resBox.classList.remove('hidden');
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 hover:bg-yellow-50 cursor-pointer text-xs font-bold border-b border-slate-50";
                div.innerText = item.display_name.split(',').slice(0,3).join(', ');
                div.onclick = () => {
                    document.getElementById('destination').value = div.innerText;
                    userData.endCoords = [parseFloat(item.lat), parseFloat(item.lon)];
                    resBox.classList.add('hidden');
                };
                resBox.appendChild(div);
            });
        }

        function quickDest(name) {
            document.getElementById('destination').value = name + ", Mendoza";
            // Forzamos coordenadas aproximadas para el ruteo visual si no elige del buscador
            userData.endCoords = [-32.8895, -68.8458]; 
        }

        // CONTROL DE PASOS
        function toStep2() {
            userData.name = document.getElementById('userName').value;
            userData.origin = document.getElementById('origin').value;
            userData.dest = document.getElementById('destination').value;

            if(!userData.name || !userData.origin || !userData.dest) {
                alert("Completa todos los campos para continuar."); return;
            }

            localStorage.setItem('taxi_mza_user', userData.name); // Guardar en cache

            // Simulación de tarifa (Mendoza base 2026)
            userData.price = Math.floor(Math.random() * (3500 - 1500) + 1500);
            document.getElementById('price-tag').innerText = `$${userData.price}`;
            
            changeStep(2);
            initMap();
        }

        function initMap() {
            if (map) map.remove();
            // Default: Mendoza Ciudad
            const start = userData.startCoords || [-32.8895, -68.8458];
            const end = userData.endCoords || [-32.9030, -68.8490];

            map = L.map('map', {zoomControl: false}).setView(start, 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            L.marker(start).addTo(map).bindPopup("Origen");
            L.marker(end).addTo(map).bindPopup("Destino");
            
            polyline = L.polyline([start, end], {color: '#facc15', weight: 6, opacity: 0.8}).addTo(map);
            map.fitBounds(polyline.getBounds(), {padding: [30, 30]});
        }

        function toStep3() {
            const WHATSAPP_NUMBER = "5492610000000"; // Número de la central
            const text = encodeURIComponent(
                `🚕 *PEDIDO DE TAXI MENDOZA*\n\n` +
                `👤 *Nombre:* ${userData.name}\n` +
                `📍 *Recoger en:* ${userData.origin}\n` +
                `🏁 *Destino:* ${userData.dest}\n` +
                `💰 *Cotización:* $${userData.price}\n\n` +
                `¿Pueden confirmar disponibilidad?`
            );
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`, '_blank');
            changeStep(3);
        }

        function shareTrip() {
            if (navigator.share) {
                navigator.share({
                    title: 'Mi Taxi en Mendoza',
                    text: `Hola! Estoy yendo desde ${userData.origin} hacia ${userData.dest}. Precio estimado: $${userData.price}.`,
                    url: window.location.href
                });
            }
        }

        function changeStep(s) {
            [1,2,3].forEach(n => document.getElementById(`step-${n}`).classList.add('step-hidden'));
            document.getElementById(`step-${s}`).classList.remove('step-hidden');
            
            const dots = document.getElementById('step-dots').children;
            Array.from(dots).forEach((dot, i) => {
                if (i + 1 === s) {
                    dot.className = "w-4 h-1.5 rounded-full bg-black transition-all duration-300";
                } else {
                    dot.className = "w-1.5 h-1.5 rounded-full bg-black/20 transition-all duration-300";
                }
            });

            if (s === 3) {
                document.getElementById('main-header').className = "bg-green-500 p-6 text-white transition-all duration-700";
                document.getElementById('header-status').innerText = "Solicitud Exitosa";
            } else {
                document.getElementById('main-header').className = "bg-yellow-400 p-6 text-black transition-all duration-700";
                document.getElementById('header-status').innerText = `Paso ${s} de 2`;
            }
        }
    </script>
</body>
</html>
