<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Mendoza - Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .step-hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #autocomplete-results { z-index: 1000; }
    </style>
</head>
<body class="bg-stone-100 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
        
        <div id="header" class="bg-yellow-400 p-6 text-black transition-colors duration-500">
            <div class="flex justify-between items-center">
                <h2 class="font-black text-xl tracking-tight flex items-center gap-2">
                    <i data-lucide="taxi"></i> MENDOZA TAXI
                </h2>
                <span id="badge" class="text-[10px] font-bold bg-black text-white px-3 py-1 rounded-full uppercase">Paso 1/3</span>
            </div>
        </div>

        <div class="p-8">
            <div id="step-1" class="fade-in space-y-5">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Tu Nombre</label>
                    <input type="text" id="userName" placeholder="Nombre para el chofer" 
                        class="w-full mt-1 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none">
                </div>
                
                <div class="relative">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Origen</label>
                    <input type="text" id="origin" placeholder="Cargando ubicación..." 
                        class="w-full mt-1 pl-4 pr-12 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400">
                    <button onclick="getCurrentLocation()" class="absolute right-3 top-9 text-yellow-600 hover:text-yellow-700">
                        <i data-lucide="locate-fixed" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Destino (Mendoza)</label>
                    <input type="text" id="destination" oninput="searchMendoza(this.value)" placeholder="Ej: Plaza Independencia" 
                        class="w-full mt-1 px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400">
                    <div id="autocomplete-results" class="absolute w-full bg-white shadow-xl rounded-xl mt-1 hidden max-h-40 overflow-y-auto border border-gray-100"></div>
                </div>

                <button onclick="validateAndGoToStep2()" class="w-full bg-black text-white font-black py-5 rounded-2xl hover:bg-zinc-800 transition-all shadow-lg">
                    COTIZAR VIAJE
                </button>
            </div>

            <div id="step-2" class="step-hidden fade-in space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase italic">Diurna</p>
                        <p id="price-day" class="text-2xl font-black text-zinc-800">$0</p>
                    </div>
                    <div class="bg-zinc-900 p-4 rounded-2xl border border-gray-800">
                        <p class="text-[10px] font-bold text-gray-500 uppercase italic">Nocturna</p>
                        <p id="price-night" class="text-2xl font-black text-yellow-400">$0</p>
                    </div>
                </div>

                <div id="map" class="w-full h-40 bg-gray-100 rounded-3xl border-4 border-white shadow-md z-0"></div>

                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-2xl shadow-xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-3">
                    SOLICITAR POR WHATSAPP <i data-lucide="message-circle"></i>
                </button>
            </div>

            <div id="step-3" class="step-hidden fade-in text-center py-4">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="shield-check" class="w-10 h-10 text-green-600"></i>
                </div>
                <h3 class="text-2xl font-black text-zinc-800">¡Pedido en curso!</h3>
                <p class="text-gray-500 text-sm mt-2 mb-8">El chofer recibirá tu ubicación exacta y los detalles del viaje.</p>
                
                <button onclick="shareTrip()" class="w-full bg-blue-50 text-blue-600 font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-blue-100 transition-colors">
                    <i data-lucide="share-2" class="w-5 h-5"></i> Compartir Trayecto
                </button>
                <button onclick="location.reload()" class="mt-6 text-gray-400 text-xs font-bold uppercase tracking-widest">Nuevo Pedido</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let map;
        let userData = { name: '', origin: '', destination: '', priceDay: 0, priceNight: 0 };

        // 1. FUNCIÓN CACHE (NOMBRE)
        window.onload = () => {
            const savedName = localStorage.getItem('taxi_user_name');
            if (savedName) document.getElementById('userName').value = savedName;
            getCurrentLocation(); // Auto-start geo
        };

        // 2. GEOLOCALIZACIÓN
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    // Reverse Geocoding simple con Nominatim
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    document.getElementById('origin').value = data.display_name.split(',')[0] + ", " + data.display_name.split(',')[1];
                });
            }
        }

        // 3. AUTOCOMPLETAR (LIMITADO A MENDOZA)
        async function searchMendoza(query) {
            const resultsDiv = document.getElementById('autocomplete-results');
            if (query.length < 3) { resultsDiv.classList.add('hidden'); return; }

            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}, Mendoza, Argentina&limit=5`);
            const locations = await response.json();

            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            locations.forEach(loc => {
                const item = document.createElement('div');
                item.className = "p-3 hover:bg-yellow-50 cursor-pointer text-sm border-b border-gray-50";
                item.innerText = loc.display_name.split(',').slice(0,3).join(',');
                item.onclick = () => {
                    document.getElementById('destination').value = item.innerText;
                    resultsDiv.classList.add('hidden');
                };
                resultsDiv.appendChild(item);
            });
        }

        // LÓGICA DE NEGOCIO Y TRANSICIONES
        function validateAndGoToStep2() {
            userData.name = document.getElementById('userName').value;
            userData.origin = document.getElementById('origin').value;
            userData.destination = document.getElementById('destination').value;

            if(!userData.name || !userData.origin || !userData.destination) return alert("Completa los datos");

            localStorage.setItem('taxi_user_name', userData.name); // Cachear nombre

            // Simulación de Tarifas Mendoza
            const base = 850;
            const kmSimulado = Math.floor(Math.random() * 15) + 2;
            userData.priceDay = base + (kmSimulado * 450);
            userData.priceNight = (userData.priceDay * 1.20).toFixed(0);

            document.getElementById('price-day').innerText = `$${userData.priceDay}`;
            document.getElementById('price-night').innerText = `$${userData.priceNight}`;

            showStep(2);
            initMap();
        }

        function initMap() {
            if (map) map.remove();
            map = L.map('map', {zoomControl: false}).setView([-32.8895, -68.8458], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.circle([-32.8895, -68.8458], {radius: 500, color: 'orange'}).addTo(map);
        }

        function sendToWhatsApp() {
            const PHONE = "5492610000000"; // Central Mendoza
            const msg = encodeURIComponent(`🚕 *NUEVO TAXI MENDOZA*\n👤 *Pasajero:* ${userData.name}\n📍 *Desde:* ${userData.origin}\n🏁 *Hacia:* ${userData.destination}\n💵 *Tarifa Est.:* $${userData.priceDay} (Día) / $${userData.priceNight} (Noche)`);
            window.open(`https://wa.me/${PHONE}?text=${msg}`, '_blank');
            showStep(3);
        }

        function shareTrip() {
            if (navigator.share) {
                navigator.share({
                    title: 'Mi Viaje en Taxi',
                    text: `Voy en camino desde ${userData.origin} hacia ${userData.destination} en un taxi de la central.`,
                    url: window.location.href
                });
            }
        }

        function showStep(s) {
            [1,2,3].forEach(n => document.getElementById(`step-${n}`).classList.add('step-hidden'));
            document.getElementById(`step-${s}`).classList.remove('step-hidden');
            document.getElementById('badge').innerText = `Paso ${s}/3`;
            if(s === 3) document.getElementById('header').className = "bg-green-500 p-6 text-white transition-colors";
        }
    </script>
</body>
</html>
