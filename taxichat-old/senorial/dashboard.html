<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Operador - Taxi Admin</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; }
        
        /* Sidebar Estilizado */
        .sidebar { width: 250px; height: 100vh; background: var(--dark); color: white; padding: 20px; }
        
        /* Contenedor Principal */
        .main-content { flex-grow: 1; padding: 30px; }
        
        /* Tarjetas de Pedidos */
        .order-card { 
            background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .order-info b { color: var(--dark); display: block; font-size: 1.1em; }
        
        /* Inputs y Botones del Dashboard */
        .admin-controls { display: flex; gap: 10px; align-items: center; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-assign { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .btn-pay { background: #009ee3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        
        .badge { background: #ffeaa7; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Taxi Admin</h2>
    <p>Operador: Central 01</p>
    <hr>
    <nav>
        <p>🚖 Pedidos Activos</p>
        <p>✅ Completados</p>
    </nav>
</div>

<div class="main-content">
    <h1>Pedidos en Tiempo Real</h1>
    <div id="orders-container">
        <div class="order-card" id="order-1">
            <div class="order-info">
                <span class="badge">Nuevo Pedido</span>
                <b>Usuario: Juan Pérez</b>
                <span>📍 Destino: Av. Siempreviva 742</span>
                <span>💰 Est: $1,250.00</span>
            </div>
            
            <div class="admin-controls">
                <input type="text" id="driver-1" placeholder="Nombre Chofer">
                <input type="number" id="time-1" placeholder="Min" style="width: 50px;">
                <button class="btn-assign" onclick="asignar(1)">Asignar</button>
                <button class="btn-pay" onclick="generarPago(1, 1250)">Link Pago</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
