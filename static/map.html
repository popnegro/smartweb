<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartKit – Mapa DOOH</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pri:#0369a1;--pri-dk:#075985;--teal:#0f766e;--bg:#f6f8fb;--panel:#fff;--soft:#f8fafc;--tx:#0f172a;--mu:#475569;--ln:#d9e2ec;--r:12px;--sh:0 1px 3px rgba(15,23,42,.07),0 6px 20px rgba(15,23,42,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.5}
button,input,select,textarea{font:inherit;outline:none;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── TOP BAR ── */
.top{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:14px;padding:10px 22px;min-height:56px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:36px;height:36px;border-radius:10px;background:var(--pri-dk);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;letter-spacing:.5px}
.brand strong{font-size:15px;font-weight:700}
.nav{display:flex;gap:4px;margin-left:auto}
.nav button,.nav a{min-height:34px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--mu);font-weight:600;font-size:13px;padding:0 13px;display:flex;align-items:center;transition:all .15s}
.nav button.on,.nav a.on{background:#e0f2fe;color:var(--pri-dk);border-color:#bae6fd}
.nav button:hover,.nav a:hover{color:var(--pri)}
.nav-link-kit{background:var(--pri-dk);color:#fff!important;border-color:var(--pri-dk)!important}
.nav-link-kit:hover{background:var(--pri)!important}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;height:20px;border-radius:999px;font-size:10px;font-weight:700;padding:0 7px;white-space:nowrap}
.bd-p{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.bd-v{background:#ccfbf1;color:#065f46;border:1px solid #99f6e4}
.bd-m{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}

/* ── BUTTONS ── */
.btn-add{width:100%;min-height:32px;border:1px solid var(--pri);border-radius:7px;background:transparent;color:var(--pri);font-weight:600;font-size:12px;transition:all .15s}
.btn-add.on{background:var(--pri-dk);border-color:var(--pri-dk);color:#fff}
.btn-add:hover:not(.on){background:#e0f2fe}

/* ── MAP ── */
.view-map{height:calc(100vh - 56px);position:relative}
#map{width:100%;height:100%}
.legend{position:absolute;bottom:22px;left:14px;z-index:999;background:rgba(255,255,255,.93);border-radius:9px;padding:7px 13px;display:flex;gap:12px;font-size:11px;border:1px solid var(--ln);box-shadow:var(--sh)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-p{background:#0369a1}.dot-v{background:#0f766e}.dot-m{background:#7c3aed}
#sc-panel{position:absolute;top:14px;right:14px;z-index:999;width:268px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--ln);display:none}
#sc-panel.open{display:block}
.scp-inner{padding:14px;position:relative}
.scp-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border:1px solid var(--ln);border-radius:6px;background:#fff;font-size:12px;color:var(--mu)}
.scp-hero{height:90px;border-radius:9px;background:linear-gradient(135deg,var(--pri-dk),var(--teal));display:grid;place-items:center;color:#fff;font-size:26px;font-weight:800;margin-bottom:11px;overflow:hidden;position:relative}
.scp-hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.scp-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:9px 0}
.scp-stat{background:var(--soft);border-radius:7px;padding:7px}
.scp-stat span{display:block;font-size:10px;color:var(--mu)}
.scp-stat strong{display:block;font-size:13px;font-weight:700}

/* ── UTILS ── */
.mu{color:var(--mu)} .sm{font-size:11px}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="logo" id="brand-logo">SK</div>
    <strong id="brand-name">SmartKit</strong>
  </div>
  <nav class="nav">
    <a href="index.html">Brochure</a>
    <a href="map.html" class="on">Mapa</a>
    <a href="mediakit.html" class="nav-link-kit">Media Kit</a>
  </nav>
</header>

<div class="view-map">
  <div id="map"></div>
  <div class="legend">
    <span><i class="dot dot-p"></i>Peatonal</span>
    <span><i class="dot dot-v"></i>Vehicular</span>
    <span><i class="dot dot-m"></i>Mixto</span>
  </div>
  <div id="sc-panel">
    <div class="scp-inner">
      <button class="scp-close" id="scp-close">✕</button>
      <div id="scp-content"></div>
    </div>
  </div>
</div>

<script src="/screens-data.js"></script>
<script>
/* ══════════════════════════════════════════════
   config.js
═══════════════════════════════════════════════ */
const CONFIG = {
  brand: 'SmartKit',
  logo: 'SK',
  whatsapp: '5492616000000',
  heroTitle: 'Pantallas DOOH · Mendoza',
  heroCopy: 'Planificá campañas digitales outdoor. Seleccioná ubicaciones, estimá alcance e inversión, y generá tu propuesta en minutos.',
  terms: 'Inicio de campaña sujeto a disponibilidad y aprobación de piezas creativas. Valores expresados en ARS. Propuesta válida por 15 días.',
};

/* ══════════════════════════════════════════════
   map-app.js
═══════════════════════════════════════════════ */
(function(){
  'use strict';

  // ── State ──
  const state = {
    screens: [],
    quote: new Set(), // We only need to know the IDs of screens in the quote
  };

  // ── Helpers ──
  const $ = id => document.getElementById(id);
  const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
  const fmtImp = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
  const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const badgeClass = {Peatonal:'bd-p',Vehicular:'bd-v',Mixto:'bd-m'};
  const dotClass = {Peatonal:'#0369a1',Vehicular:'#0f766e',Mixto:'#7c3aed'};
  function toast(msg, duration=1800){
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
    setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),200)},duration);
  }

  // ── Boot ──
  function boot(){
    // Adapt data from screens-data.js to the app's expected format
    const adaptedScreens = (window.SCREENS || []).map(s => ({
      id: `sc-${s.id}`,
      nombre: s.n,
      zona: s.b,
      tipo: s.tipo,
      impactos: parseInt(String(s.imp || '0').replace(/\./g, ''), 10) || 0,
      precio: s.precio,
      status: 'Activo', // Assuming all screens from this source are active
      lat: s.lat,
      lng: s.lng,
      nota: s.dir,
      video: s.video,
    }));

    state.screens = adaptedScreens.filter(s => s.status === 'Activo');

    // Load quote from localStorage
    state.quote = new Set(JSON.parse(localStorage.getItem('smartkit_quote') || '[]'));

    applyConfig();
    initMap();
  }

  function applyConfig(){
    const c=window.CONFIG||{};
    ['brand-logo','brand-name'].forEach(id=>{const el=$(id); if(el) el.textContent=id.includes('logo')?c.logo:c.brand;});
  }

  // ── Map ──
  function initMap(){
    if(!window.L) return;
    const mapEl=$('map'); if(!mapEl) return;
    const center=[-32.903,-68.839];
    const lMap=L.map('map').setView(center,12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',maxZoom:19,
    }).addTo(lMap);
    state.screens.forEach(s=>{
      if(!s.lat||!s.lng) return;
      const m=L.circleMarker([s.lat,s.lng],{radius:9,fillColor:dotClass[s.tipo]||'#64748b',color:'#fff',weight:2,fillOpacity:.9}).addTo(lMap);
      m.on('click',()=>showPanel(s));
    });
    $('scp-close')?.addEventListener('click',()=>$('sc-panel').classList.remove('open'));
  }

  function showPanel(s){
    const panel=$('sc-panel'); if(!panel) return;
    const inQ = state.quote.has(s.id);
    $('scp-content').innerHTML=`
      <div class="scp-hero">${s.video?`<video src="${esc(s.video)}" autoplay muted loop playsinline></video>`:esc((s.nombre||'').substring(0,2).toUpperCase())}</div>
      <strong>${esc(s.nombre)}</strong>
      <p class="mu sm">${esc(s.zona)} · <span class="badge ${badgeClass[s.tipo]||''}">${esc(s.tipo)}</span></p>
      <div class="scp-stats">
        <div class="scp-stat"><span>Impactos/día</span><strong>${fmtImp(s.impactos)}</strong></div>
        <div class="scp-stat"><span>Precio/semana</span><strong>${fmt(s.precio)}</strong></div>
      </div>
      ${s.nota?`<p class="mu sm" style="margin-bottom:10px">${esc(s.nota)}</p>`:''}
      <button class="btn-add${inQ?' on':''}" data-id="${esc(s.id)}">${inQ?'✓ En cotizador':'Añadir al cotizador'}</button>`;
    panel.classList.add('open');

    panel.querySelector('.btn-add')?.addEventListener('click', function() {
      toggleQuote(this.dataset.id);
    });
  }

  function toggleQuote(id) {
    const screen = state.screens.find(s => s.id === id);
    if (!screen) return;
    state.quote.has(id) ? state.quote.delete(id) : state.quote.add(id);
    localStorage.setItem('smartkit_quote', JSON.stringify([...state.quote]));
    showPanel(screen); // Re-render panel to update button state
    toast(state.quote.has(id) ? `${screen.nombre} agregada` : `${screen.nombre} quitada`);
  }

  // ── Init ──
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',boot):boot();
})();
</script>
</body>
</html>
