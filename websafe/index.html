<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWeb AI | Auditoría Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass-dark { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="antialiased">

<header class="bg-[#0f172a] text-white py-24 relative overflow-hidden">
    <div class="container mx-auto px-4 text-center relative z-10">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter italic">SafeWeb<span class="gradient-text">AI</span></h1>
        <p class="text-xl text-slate-400 mb-12 font-light">Auditoría blindada con IA y métricas oficiales de Google.</p>
        
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row shadow-2xl rounded-[2.5rem] overflow-hidden bg-white p-2 focus-within:ring-8 focus-within:ring-blue-500/20 transition-all">
                <input type="url" id="siteUrl" class="flex-grow p-6 text-slate-800 text-xl outline-none" placeholder="https://ejemplo.com">
                <button onclick="runSecureAudit()" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-12 py-6 transition-all uppercase tracking-widest rounded-[2rem]">
                    Analizar Sitio
                </button>
            </div>
            
            <div id="loader" class="hidden mt-12">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                    <p class="text-xs font-black tracking-[0.3em] uppercase text-blue-400 animate-pulse">Consultando Seguridad Híbrida...</p>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 -mt-10 mb-20 hidden" id="reportArea">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4">
            <div class="bg-white rounded-[3rem] p-12 text-center card-shadow border border-slate-100 sticky top-10">
                <h2 class="text-slate-400 font-bold uppercase tracking-widest text-[10px] mb-10">Health Score</h2>
                <div id="score" class="text-[9rem] leading-none font-black mb-8 tracking-tighter">0</div>
                <div id="healthLabel" class="inline-block px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest mb-10"></div>
                
                <div class="pt-8 border-t border-slate-50 space-y-4">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                        <span>Seguridad Técnica</span>
                        <span id="sec-perc">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="sec-bar" class="bg-blue-600 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div id="ai-container" class="mb-8 p-10 bg-slate-900 text-white rounded-[3rem] shadow-2xl relative overflow-hidden">
                <h4 class="text-blue-400 font-black uppercase tracking-widest text-[10px] mb-4 flex items-center gap-2">
                    <i class="bi bi-robot"></i> Recomendación de la IA
                </h4>
                <p id="ai-text" class="text-xl font-light italic leading-relaxed opacity-90"></p>
            </div>

            <div class="bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden" id="issueList"></div>

            <div class="mt-8 bg-blue-600 rounded-[3rem] p-12 text-white flex justify-between items-center shadow-2xl">
                <p class="text-2xl font-bold">¿Necesitas ayuda profesional?</p>
                <a href="https://wa.me/TUNUMERO" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black hover:bg-yellow-400 hover:text-slate-900 transition-all">WHATSAPP</a>
            </div>
        </section>
    </div>
</main>

<script>
const WORKER_URL = "https://websafe-proxy.smartwebmendoza.workers.dev/?url=";

async function runSecureAudit() {
    const site = document.getElementById('siteUrl').value;
    if(!site) return alert("Ingresa una URL");
    
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('reportArea').classList.add('hidden');

    try {
        const res = await fetch(`${WORKER_URL}${encodeURIComponent(site)}`);
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        renderResults(data);
    } catch(e) {
        alert("Error de conexión con el servidor seguro.");
        document.getElementById('loader').classList.add('hidden');
    }
}

function renderResults(data) {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('reportArea').classList.remove('hidden');
    
    // IA
    document.getElementById('ai-text').innerText = data.aiAdvice;

    // Cálculos de issues
    const issues = [];
    let secPts = 40;
    
    // Google Performance
    issues.push({
        text: `Google Score: ${Math.round(data.gScore)}/100`,
        desc: 'Métrica oficial de rendimiento y velocidad Lighthouse.',
        hex: data.gScore > 80 ? '#10b981' : '#f59e0b',
        icon: 'bi-speedometer'
    });

    // Headers
    if(!data.securityHeaders.hsts) { issues.push({text:'Sin HSTS', desc:'Riesgo de intercepción de datos.', hex:'#ef4444', icon:'bi-lock'}); secPts -= 20; }
    if(!data.securityHeaders.csp) { issues.push({text:'Sin CSP', desc:'Vulnerable a inyecciones XSS.', hex:'#ef4444', icon:'bi-shield-x'}); secPts -= 20; }

    const finalScore = Math.round((data.gScore * 0.5) + (secPts * 1.5));
    
    // Render UI
    const scoreEl = document.getElementById('score');
    scoreEl.innerText = finalScore;
    scoreEl.style.color = finalScore > 70 ? '#10b981' : '#ef4444';
    
    const label = document.getElementById('healthLabel');
    label.innerText = finalScore > 70 ? 'Salud Óptima' : 'Riesgo Detectado';
    label.style.background = finalScore > 70 ? '#dcfce7' : '#fee2e2';
    label.style.color = finalScore > 70 ? '#166534' : '#991b1b';

    document.getElementById('sec-perc').innerText = `${Math.max(0, (secPts/40)*100)}%`;
    document.getElementById('sec-bar').style.width = `${Math.max(0, (secPts/40)*100)}%`;

    document.getElementById('issueList').innerHTML = issues.map(i => `
        <div class="flex items-center p-10 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-all">
            <div class="w-16 h-16 rounded-2xl mr-8 flex items-center justify-center text-3xl" style="background: ${i.hex}15; color: ${i.hex}">
                <i class="bi ${i.icon}"></i>
            </div>
            <div>
                <h4 class="font-black text-xl text-slate-800">${i.text}</h4>
                <p class="text-slate-500 font-light">${i.desc}</p>
            </div>
        </div>
    `).join('');
}
</script>
</body>
</html>
