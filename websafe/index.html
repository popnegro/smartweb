<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWeb AI | Auditoría Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .gradient-dark { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
    </style>
</head>
<body>

<header class="gradient-dark text-white py-20 px-4 text-center">
    <h1 class="text-6xl font-black mb-4 italic italic">SafeWeb<span class="text-blue-500">AI</span></h1>
    <p class="text-slate-400 mb-10 text-lg">Auditoría con IA: Velocidad, Autoridad y Seguridad.</p>
    
    <div class="max-w-3xl mx-auto flex flex-col md:flex-row gap-2 bg-white p-2 rounded-3xl shadow-2xl">
        <input type="url" id="siteUrl" class="flex-grow p-4 text-slate-800 outline-none px-6 text-lg" placeholder="https://ejemplo.com">
        <button onclick="startAudit()" id="btnMain" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-10 py-4 rounded-2xl transition-all uppercase tracking-widest">
            Analizar
        </button>
    </div>
    
    <div id="loader" class="hidden mt-10 animate-pulse text-blue-400 font-bold tracking-widest text-xs">
        <i class="bi bi-cpu text-2xl mb-2 block"></i> PROCESANDO MÉTRICAS...
    </div>
</header>

<main id="reportArea" class="container mx-auto px-4 -mt-10 mb-20 hidden">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4">
            <div class="bg-white rounded-[2.5rem] p-10 text-center shadow-xl border border-slate-100 sticky top-10">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Health Index</p>
                <div id="mainScore" class="text-9xl font-black leading-none tracking-tighter mb-6">0</div>
                <div id="healthStatus" class="inline-block px-6 py-2 rounded-full text-[10px] font-black uppercase mb-10"></div>
                
                <div class="pt-8 border-t space-y-4">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                        <span>Autoridad OPR</span>
                        <span id="oprVal">0.00</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="oprBar" class="bg-purple-500 h-full transition-all duration-1000"></div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="bg-slate-900 rounded-[3rem] p-10 shadow-2xl mb-8">
                <h3 class="text-blue-400 font-black uppercase tracking-widest text-[10px] mb-8 flex items-center gap-2">
                    <i class="bi bi-robot text-lg"></i> Plan de Acción Personalizado (IA)
                </h3>
                <div id="aiPlanContainer" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-lg overflow-hidden border border-slate-100" id="issuesList">
                </div>
            
            <div class="mt-8 bg-blue-600 p-10 rounded-[2.5rem] text-white flex justify-between items-center shadow-2xl">
                <h4 class="text-2xl font-bold">¿Listo para mejorar?</h4>
                <a href="https://wa.me/TUNUMERO" class="bg-white text-blue-600 px-8 py-4 rounded-xl font-black hover:bg-yellow-400 hover:text-black transition-all">WHATSAPP</a>
            </div>
        </section>
    </div>
</main>

<script>
const WORKER_URL = "https://websafe-proxy.smartwebmendoza.workers.dev/?url=";

async function startAudit() {
    const url = document.getElementById('siteUrl').value;
    if(!url) return alert("URL necesaria");

    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('reportArea').classList.add('hidden');
    document.getElementById('btnMain').disabled = true;

    try {
        const res = await fetch(`${WORKER_URL}${encodeURIComponent(url)}`);
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        renderResults(data);
    } catch(e) {
        alert("Error en el servidor. Verifica las API Keys.");
    } finally {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('btnMain').disabled = false;
    }
}

function renderResults(data) {
    document.getElementById('reportArea').classList.remove('hidden');

    // 1. Renderizar Plan de Acción (3 pasos)
    const lines = data.aiPlan.split('\n').filter(l => l.includes('|'));
    let html = '';
    lines.slice(0,3).forEach((line, i) => {
        const [tit, desc, imp] = line.split('|');
        html += `
            <div class="flex gap-6 p-6 bg-slate-800/50 rounded-3xl border border-white/5 group hover:border-blue-500/30 transition-all">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-black flex-shrink-0">${i+1}</div>
                <div>
                    <h5 class="text-blue-400 font-black text-xs uppercase mb-1">${tit}</h5>
                    <p class="text-slate-300 text-lg font-light mb-2">${desc}</p>
                    <span class="text-[9px] font-black bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full uppercase tracking-tighter italic">Impacto: ${imp}</span>
                </div>
            </div>`;
    });
    document.getElementById('aiPlanContainer').innerHTML = html || '<p class="text-slate-400">Analizando detalles...</p>';

    // 2. Score y OPR
    document.getElementById('oprVal').innerText = (data.pageRank || 0).toFixed(2);
    document.getElementById('oprBar').style.width = `${(data.pageRank/10)*100}%`;

    const finalScore = Math.round((data.gScore * 0.4) + (data.pageRank * 10 * 0.3) + (data.hasHsts ? 30 : 5));
    const scoreEl = document.getElementById('mainScore');
    scoreEl.innerText = finalScore;
    scoreEl.style.color = finalScore > 70 ? '#10b981' : (finalScore > 40 ? '#f59e0b' : '#ef4444');

    const label = document.getElementById('healthStatus');
    label.innerText = finalScore > 70 ? 'Salud Óptima' : 'Riesgo Detectado';
    label.style.background = finalScore > 70 ? '#dcfce7' : '#fee2e2';
    label.style.color = finalScore > 70 ? '#166534' : '#991b1b';

    // 3. Hallazgos
    const items = [
        { t: 'Velocidad Google', v: `${Math.round(data.gScore)}/100`, i: 'bi-lightning', c: data.gScore > 70 ? '#10b981' : '#f59e0b' },
        { t: 'Autoridad OPR', v: `${(data.pageRank || 0).toFixed(2)}/10`, i: 'bi-trophy', c: '#8b5cf6' },
        { t: 'Seguridad HSTS', v: data.hasHsts ? 'OK' : 'FALTA', i: 'bi-shield-lock', c: data.hasHsts ? '#10b981' : '#ef4444' }
    ];

    document.getElementById('issuesList').innerHTML = items.map(x => `
        <div class="flex items-center p-8 border-b last:border-0 hover:bg-slate-50 transition-all">
            <div class="w-12 h-12 rounded-xl mr-6 flex items-center justify-center text-xl" style="background: ${x.c}15; color: ${x.c}"><i class="bi ${x.i}"></i></div>
            <h4 class="font-bold text-slate-800">${x.t}: <span style="color: ${x.c}">${x.v}</span></h4>
        </div>`).join('');

    window.scrollTo({ top: document.getElementById('reportArea').offsetTop - 50, behavior: 'smooth' });
}
</script>
</body>
</html>
