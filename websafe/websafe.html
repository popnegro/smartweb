<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWeb AI | Reporte Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .hero-gradient { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .card-dash { background: white; border-radius: 2.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="antialiased text-slate-900">

<header class="hero-gradient text-white py-24 px-4 text-center relative overflow-hidden">
    <h1 class="text-7xl font-black mb-4 italic tracking-tighter">SafeWeb<span class="text-blue-500">AI</span></h1>
    <p class="text-slate-400 mb-12 uppercase tracking-[0.4em] text-[10px] font-bold">Inteligencia Artificial aplicada a Auditoría Web</p>
    
    <div class="max-w-3xl mx-auto flex flex-col md:flex-row gap-3 bg-white/10 p-3 rounded-[3rem] backdrop-blur-md">
        <input type="url" id="siteUrl" class="flex-grow p-5 bg-white text-slate-900 outline-none px-8 rounded-[2.5rem] text-lg" placeholder="https://ejemplo.com">
        <button onclick="startAudit()" id="btnMain" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-12 py-5 rounded-[2.5rem] transition-all uppercase tracking-widest active:scale-95 shadow-xl">
            Auditar
        </button>
    </div>
</header>

<main id="reportArea" class="container mx-auto px-4 -mt-16 mb-20 hidden">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <aside class="lg:col-span-4">
            <div class="card-dash p-10 text-center sticky top-10 border border-slate-200">
                <div id="mainScore" class="text-9xl font-black tracking-tighter mb-4 leading-none">0</div>
                <div id="healthStatus" class="inline-block px-8 py-2.5 rounded-full text-[10px] font-black uppercase mb-10 tracking-widest border"></div>
                
                <div class="max-w-[220px] mx-auto mb-10">
                    <canvas id="radarChart"></canvas>
                </div>

                <div class="flex justify-between border-t pt-8 text-left">
                    <div><p class="text-[9px] uppercase font-bold text-slate-400">Plataforma</p><p id="cmsVal" class="font-black text-blue-600 uppercase text-xs">-</p></div>
                    <div><p class="text-[9px] uppercase font-bold text-slate-400">Respuesta</p><p id="ttfbVal" class="font-black text-slate-700 text-xs">- ms</p></div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="bg-slate-900 rounded-[3.5rem] p-12 shadow-2xl mb-10 text-white relative">
                <h3 class="text-blue-400 font-black uppercase tracking-[0.3em] text-[10px] mb-12 flex items-center gap-3">
                    <i class="bi bi-robot text-xl"></i> Hoja de Ruta Estratégica (IA)
                </h3>
                <div id="aiPlanContainer" class="space-y-6"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10" id="issuesList"></div>

            <div class="bg-blue-600 p-12 rounded-[3.5rem] text-white flex flex-col md:flex-row justify-between items-center gap-8 shadow-2xl">
                <div><h4 class="text-3xl font-black mb-2 italic">¿Corregimos estos errores?</h4><p class="opacity-80">Solicita una consultoría para implementar estas mejoras.</p></div>
                <a href="https://wa.me/TUNUMERO" class="bg-white text-blue-600 px-12 py-6 rounded-[2.5rem] font-black text-xl hover:bg-yellow-400 transition-all shadow-xl uppercase tracking-widest">WhatsApp</a>
            </div>
        </section>
    </div>
</main>

<script>
const WORKER_URL = "https://websafe-proxy.smartwebmendoza.workers.dev/?url=";
let radarChart = null;

async function startAudit() {
    const url = document.getElementById('siteUrl').value;
    if(!url) return;
    const btn = document.getElementById('btnMain');
    btn.disabled = true; btn.innerText = "PROCESANDO...";
    document.getElementById('reportArea').classList.add('hidden');

    try {
        const res = await fetch(`${WORKER_URL}${encodeURIComponent(url)}`);
        const data = await res.json();
        renderResults(data);
    } catch(e) { alert("Error en el servidor"); }
    finally { btn.disabled = false; btn.innerText = "Auditar"; }
}

function renderResults(data) {
    document.getElementById('reportArea').classList.remove('hidden');
    document.getElementById('cmsVal').innerText = data.cms;
    document.getElementById('ttfbVal').innerText = data.serverSpeed + ' ms';

    // 1. Radar Chart
    if(radarChart) radarChart.destroy();
    radarChart = new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['Carga', 'Ranking', 'Seguridad'],
            datasets: [{
                data: [data.gScore, data.pageRank * 10, data.hasHsts ? 100 : 20],
                backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 3, pointRadius: 0
            }]
        },
        options: { scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#f1f5f9' } } }, plugins: { legend: { display: false } } }
    });

    // 2. IA Plan Render (3 Consejos forzados)
    const lines = data.aiPlan.split('\n').map(l => l.trim()).filter(l => l.includes('|')).slice(0, 3);
    document.getElementById('aiPlanContainer').innerHTML = lines.map((line, i) => {
        let [tit, desc, imp] = line.split('|').map(p => p.trim().replace(/^[-.*0-9]+\s*/, ''));
        return `
            <div class="p-8 bg-white/5 rounded-3xl border border-white/5 group hover:border-blue-500/20 transition-all flex gap-6 items-start">
                <div class="text-4xl font-black text-blue-500/20 leading-none">${(i+1).toString().padStart(2, '0')}</div>
                <div class="flex-grow">
                    <h5 class="text-blue-400 font-black text-[10px] uppercase mb-2 tracking-widest">${tit || 'Mejora'}</h5>
                    <p class="text-slate-300 text-lg font-light mb-4">${desc || '-'}</p>
                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest ${imp?.toLowerCase().includes('alto')?'bg-emerald-500/20 text-emerald-400':'bg-blue-500/20 text-blue-400'}">Impacto: ${imp || 'Alto'}</span>
                </div>
            </div>`;
    }).join('');

    // 3. Score & Health
    const finalScore = Math.round((data.gScore * 0.4) + (data.pageRank * 10 * 0.3) + (data.hasHsts ? 30 : 5));
    const scoreEl = document.getElementById('mainScore');
    scoreEl.innerText = finalScore;
    scoreEl.style.color = finalScore > 70 ? '#10b981' : (finalScore > 40 ? '#f59e0b' : '#ef4444');
    
    const label = document.getElementById('healthStatus');
    label.innerText = finalScore > 70 ? 'ÓPTIMO' : (finalScore > 40 ? 'RIESGO' : 'CRÍTICO');
    label.className = `inline-block px-8 py-2.5 rounded-full text-[11px] font-black uppercase mb-10 tracking-widest border ${finalScore > 70 ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'}`;

    // 4. Hallazgos cards
    const items = [
        { t: 'Google Speed', v: `${Math.round(data.gScore)}/100`, i: 'bi-lightning', c: data.gScore > 70 ? '#10b981' : '#f59e0b' },
        { t: 'Autoridad OPR', v: `${data.pageRank.toFixed(2)}/10`, i: 'bi-trophy', c: '#8b5cf6' },
        { t: 'SEO Imágenes', v: `${data.seoImages}%`, i: 'bi-image', c: data.seoImages > 80 ? '#10b981' : '#f59e0b' },
        { t: 'Marketing Tags', v: data.analytics ? 'SI' : 'NO', i: 'bi-graph-up', c: data.analytics ? '#10b981' : '#ef4444' },
        { t: 'Compresión', v: data.compression ? 'ACTIVA' : 'FALTA', i: 'bi-box', c: data.compression ? '#10b981' : '#ef4444' },
        { t: 'Social Graph', v: data.socialReady ? 'LISTO' : 'ERROR', i: 'bi-share', c: data.socialReady ? '#10b981' : '#f59e0b' }
    ];
    document.getElementById('issuesList').innerHTML = items.map(x => `
        <div class="card-dash p-8 flex items-center gap-6 border border-slate-100">
            <div class="w-16 h-16 rounded-3xl flex items-center justify-center text-2xl" style="background: ${x.c}10; color: ${x.c}"><i class="bi ${x.i}"></i></div>
            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${x.t}</p><p class="text-xl font-black" style="color: ${x.c}">${x.v}</p></div>
        </div>`).join('');

    window.scrollTo({ top: document.getElementById('reportArea').offsetTop - 50, behavior: 'smooth' });
}
</script>
</body>
</html>
