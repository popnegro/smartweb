<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookKit · Sistema de Reservas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-D5QhSYkn.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CBFOJew_.css">
  </head>
  <body class="min-h-screen">
    <nav class="sticky top-0 z-50 shadow-xl bg-gradient-to-br from-slate-900 to-slate-800">
      <div class="max-w-[1600px] mx-auto px-4 md:px-6 py-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2.5 shrink-0">
          <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center font-bold text-white text-base">⚡</div>
          <span class="font-display font-bold text-white text-lg hidden sm:block tracking-tight">BookKit</span>
        </div>

        <div class="flex bg-white/10 p-1 rounded-xl gap-1" role="tablist" aria-label="Modo de reserva">
          <button id="mode-taxi" data-action="set-mode" data-mode="taxi" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5">
            <span>🚖</span><span class="hidden sm:inline">Taxi / Remis</span>
          </button>
          <button id="mode-mudanzas" data-action="set-mode" data-mode="mudanzas" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5">
            <span>📦</span><span class="hidden sm:inline">Mudanzas</span>
          </button>
          <button id="mode-buses" data-action="set-mode" data-mode="buses" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5">
            <span>🚌</span><span class="hidden sm:inline">Buses</span>
          </button>
        </div>

        <div class="flex bg-white/10 p-1 rounded-xl" role="tablist" aria-label="Vista">
          <button id="view-widget-btn" data-action="set-view" data-view="widget" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all">Widget</button>
          <button id="view-dash-btn" data-action="set-view" data-view="dashboard" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all">Dashboard</button>
        </div>
      </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8 min-h-[calc(100vh-64px)] bg-[#F4F6FA]">
      <section id="view-widget" class="flex justify-center py-8">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
          <div class="h-1.5 bg-[var(--accent)]"></div>
          <div id="widget-inner" class="p-7"></div>
        </div>
      </section>

      <section id="view-dashboard" class="hidden"></section>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="confirm-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
      <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 transform transition-transform scale-95 opacity-0 duration-200" id="modal-content">
        <div class="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4 text-xl">⚠</div>
        <h3 class="font-display text-xl font-bold text-slate-800 mb-2">¿Archivar solicitudes?</h3>
        <p class="text-slate-500 text-sm mb-6">Se marcarán como canceladas todas las solicitudes visibles del modo actual.</p>
        <div class="flex gap-3">
          <button data-action="toggle-modal" data-show="false" class="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-all font-display text-sm">Cancelar</button>
          <button data-action="execute-clear" class="flex-1 px-4 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all font-display shadow-lg shadow-red-100">Archivar</button>
        </div>
      </div>
    </div>

  </body>
</html>
