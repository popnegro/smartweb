<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Gestión de Turnos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

<div class="max-w-5xl mx-auto">
  <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Panel de Turnos</h2>
      <p class="text-slate-500 mt-1">Administración y control de solicitudes entrantes.</p>
    </div>
    <div class="bg-white px-6 py-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
      <div class="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></div>
      <span class="text-sm font-semibold text-slate-600">Total Hoy: <span id="total-count" class="text-indigo-600 ml-1">0</span></span>
    </div>
  </header>

  <!-- Listado de Turnos -->
  <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Los turnos se renderizan aquí dinámicamente -->
  </div>
</div>

<script>
// Datos Mock (Lógica extraída de Untitled-1.html)
// Cargar turnos desde LocalStorage o usar datos de ejemplo si no hay nada
let appointments = JSON.parse(localStorage.getItem('appointmentsData')) || [
  { id: Date.now() + 1, nombre: 'Juan Pérez (Ejemplo)', tipo: 'Consulta general', disponibilidad: '29/04/2026 09:30', estado: 'nuevo', email: 'juan@example.com', mensaje: 'Dolor de cabeza' },
  { id: Date.now() + 2, nombre: 'María Gómez (Ejemplo)', tipo: 'Cirugía láser', disponibilidad: '29/04/2026 14:00', estado: 'nuevo', email: 'maria@example.com', mensaje: 'Revisión post-operatoria' },
  { id: Date.now() + 3, nombre: 'Carlos Ruiz (Ejemplo)', tipo: 'Ojo seco', disponibilidad: '28/04/2026 10:00', estado: 'confirmado', email: 'carlos@example.com', mensaje: 'Control anual' }
];

const statusStyles = {
  nuevo: "bg-blue-100 text-blue-700",
  confirmado: "bg-green-100 text-green-700",
  cancelado: "bg-red-100 text-red-700"
};

function render() {
  const list = document.getElementById('list');
  document.getElementById('total-count').innerText = appointments.filter(t => t.estado === 'nuevo' || t.estado === 'confirmado').length;
  
  list.innerHTML = appointments.map(t => `
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 transition-all hover:scale-[1.02] flex flex-col h-full">
      <div class="flex justify-between items-start mb-4 gap-2">
        <div class="min-w-0">
          <h3 class="font-bold text-slate-800 text-lg leading-tight truncate" title="${t.nombre}">${t.nombre}</h3>
          <p class="text-sm text-indigo-600 font-semibold mt-1 truncate">${t.tipo}</p>
        </div>
        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shrink-0 ${statusStyles[t.estado]}">
          ${t.estado}
        </span>
      </div>
      
      <div class="text-slate-500 text-sm mb-6 bg-slate-50 p-3 rounded-xl border border-slate-100 flex-1 space-y-2">
        <div class="flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="font-medium text-slate-700 truncate">${t.disponibilidad}</span>
        </div>
        ${t.email ? `
          <div class="flex flex-col border-t border-slate-200 pt-2 mt-2">
            <span class="text-[10px] uppercase font-bold text-slate-400">Email</span>
            <span class="break-all text-slate-600">${t.email}</span>
          </div>` : ''}
        ${t.mensaje ? `
          <div class="flex flex-col border-t border-slate-200 pt-2">
            <span class="text-[10px] uppercase font-bold text-slate-400">Mensaje</span>
            <p class="italic text-slate-600 line-clamp-2">${t.mensaje}</p>
          </div>` : ''}
      </div>

      <div class="grid grid-cols-2 gap-3 mt-auto">
        <button onclick="update(${t.id}, 'confirmado')" 
                class="flex items-center justify-center bg-indigo-600 text-white hover:bg-indigo-700 font-bold py-3 px-4 rounded-xl transition-all shadow-md shadow-indigo-100 text-sm">
          Confirmar
        </button>
        <button onclick="update(${t.id}, 'cancelado')" 
                class="flex items-center justify-center bg-slate-100 text-slate-500 hover:bg-red-50 hover:text-red-600 font-bold py-3 px-4 rounded-xl transition-all text-sm">
          Rechazar
        </button>
      </div>
    </div>
  `).join('');
}

// Función de actualización (Lógica de Untitled-1.html)
function update(id, estado) {
  appointments = appointments.map(t => 
    t.id === id ? { ...t, estado } : t
  );
  localStorage.setItem('appointmentsData', JSON.stringify(appointments)); // Guardar cambios en LocalStorage
  render();
}

// Escuchar cambios en LocalStorage desde otras pestañas
window.addEventListener('storage', (event) => {
  if (event.key === 'appointmentsData') {
    appointments = JSON.parse(event.newValue) || [];
    render();
  }
});

// Carga inicial
render();
</script>

</body>
</html>
