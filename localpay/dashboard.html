<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>LocalPay | Merchant Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.372.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; @apply bg-neutral-50 text-black; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; }
        .tab-btn.active { @apply border-black text-black border-b-4; }
        .metro-card { @apply bg-white border border-neutral-200 shadow-sm; border-radius: 0; }
        .btn-black { @apply bg-black text-white font-bold uppercase tracking-widest p-4 transition-all active:scale-95 disabled:bg-neutral-300; border-radius: 0; }
        .uber-input { @apply w-full bg-neutral-100 p-4 text-sm font-medium outline-none focus:bg-white focus:ring-2 focus:ring-black transition-all; border-radius: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-10">
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">Local<span class="text-neutral-300">Pay</span></h1>
                <p class="text-[10px] font-bold uppercase tracking-[4px] text-neutral-400 mt-4">Merchant Dashboard</p>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" required class="uber-input">
                <input type="password" id="login-pass" placeholder="Contraseña" required class="uber-input">
                <button type="submit" id="login-btn" class="btn-black w-full flex justify-center items-center gap-3">
                    Ingresar <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <nav class="bg-black text-white p-6 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter">LOCAL<span class="text-neutral-400">PAY</span></h1>
        <button onclick="logout()" class="text-neutral-400 hover:text-white transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
    </nav>

    <div class="bg-white border-b border-neutral-200 sticky top-0 z-50 overflow-x-auto flex">
        <button onclick="openTab(event, 'radar')" class="tab-btn active flex-1 p-4 text-[10px] font-black uppercase tracking-widest text-neutral-400 border-b-4 border-transparent">
            <i data-lucide="activity" class="w-4 h-4 mx-auto mb-1"></i> Radar
        </button>
        <button onclick="openTab(event, 'qr')" class="tab-btn flex-1 p-4 text-[10px] font-black uppercase tracking-widest text-neutral-400 border-b-4 border-transparent">
            <i data-lucide="qr-code" class="w-4 h-4 mx-auto mb-1"></i> Cobrar
        </button>
        <button onclick="openTab(event, 'movimientos')" class="tab-btn flex-1 p-4 text-[10px] font-black uppercase tracking-widest text-neutral-400 border-b-4 border-transparent">
            <i data-lucide="list" class="w-4 h-4 mx-auto mb-1"></i> Movimientos
        </button>
        <button onclick="openTab(event, 'db')" class="tab-btn flex-1 p-4 text-[10px] font-black uppercase tracking-widest text-neutral-400 border-b-4 border-transparent">
            <i data-lucide="database" class="w-4 h-4 mx-auto mb-1"></i> Entidades
        </button>
    </div>

    <main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">

        <section id="radar" class="tab-content active flex-col space-y-6">
            <div class="metro-card p-12 text-center flex flex-col items-center justify-center space-y-4 min-h-[400px]">
                <div id="status-light" class="w-32 h-32 rounded-full border-8 border-neutral-100 flex items-center justify-center bg-neutral-50 transition-all duration-500">
                    <i data-lucide="refresh-cw" class="w-12 h-12 text-neutral-300 animate-spin"></i>
                </div>
                <h2 id="status-text" class="text-2xl font-black uppercase italic tracking-tighter">Esperando Pago...</h2>
            </div>
        </section>

        <section id="qr" class="tab-content flex-col space-y-6">
            <div class="metro-card p-8 space-y-6">
                <h3 class="text-xl font-black uppercase tracking-tight">Generar Cobro</h3>
                <div class="space-y-4">
                    <input type="number" id="monto-cobro" step="0.01" placeholder="0.00" class="w-full text-5xl font-black p-4 bg-neutral-50 border-none outline-none focus:bg-white focus:ring-2 focus:ring-black">
                    <button class="btn-black w-full" onclick="alert('QR Generado (Simulación)')">Generar QR Dinámico</button>
                </div>
            </div>
        </section>

        <section id="movimientos" class="tab-content flex-col space-y-4">
            <h3 class="text-xl font-black uppercase tracking-tight">Historial de Hoy</h3>
            <div id="mov-list" class="space-y-3">
                <div class="metro-card p-4 flex justify-between items-center">
                    <span class="font-bold">Venta Mostrador</span>
                    <span class="font-black text-green-600">+$12.400</span>
                </div>
            </div>
        </section>

        <section id="db" class="tab-content flex-col space-y-6">
            <div class="flex justify-between items-end">
                <h3 class="text-2xl font-black uppercase tracking-tighter">Entidades</h3>
                <div class="flex gap-2">
                    <button onclick="exportToCSV()" class="text-[10px] font-black underline uppercase p-2">Exportar CSV</button>
                    <button onclick="toggleModal('modal-entidad')" class="btn-black !p-3 flex items-center gap-2 text-[10px]">
                        <i data-lucide="plus" class="w-4 h-4"></i> NUEVO
                    </button>
                </div>
            </div>

            <div class="flex border border-black p-1 bg-neutral-100">
                <button onclick="filterEntities('todos')" class="filter-btn active-filter flex-1 py-2 text-[10px] font-bold uppercase">Todos</button>
                <button onclick="filterEntities('cliente')" class="filter-btn flex-1 py-2 text-[10px] font-bold uppercase">Clientes</button>
                <button onclick="filterEntities('proveedor')" class="filter-btn flex-1 py-2 text-[10px] font-bold uppercase">Proveedores</button>
            </div>

            <div class="metro-card overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-black text-white">
                        <tr>
                            <th class="p-4 text-[10px] font-bold uppercase tracking-widest">Entidad</th>
                            <th class="p-4 text-[10px] font-bold uppercase tracking-widest">Tipo</th>
                            <th class="p-4 text-[10px] font-bold uppercase tracking-widest">Contacto</th>
                        </tr>
                    </thead>
                    <tbody id="entity-table-body" class="divide-y divide-neutral-200"></tbody>
                </table>
            </div>
        </section>

    </main>

    <div id="modal-entidad" class="fixed inset-0 bg-black/90 z-[3000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-8 space-y-6">
            <h4 class="text-xl font-black uppercase italic">Nuevo Registro</h4>
            <form id="form-entidad" class="space-y-4">
                <div class="flex gap-2 p-1 bg-neutral-100">
                    <label class="flex-1 text-center cursor-pointer"><input type="radio" name="tipo" value="cliente" class="hidden peer" checked><div class="py-2 text-[10px] font-black peer-checked:bg-black peer-checked:text-white">CLIENTE</div></label>
                    <label class="flex-1 text-center cursor-pointer"><input type="radio" name="tipo" value="proveedor" class="hidden peer"><div class="py-2 text-[10px] font-black peer-checked:bg-black peer-checked:text-white">PROVEEDOR</div></label>
                </div>
                <input type="text" name="nombre" placeholder="Nombre / Razón Social" class="uber-input" required>
                <div id="prov-fields" class="hidden space-y-4">
                    <input type="text" name="cuit" id="cuit-input" placeholder="CUIT (Solo números)" class="uber-input">
                    <select name="rubro" class="uber-input"><option value="Mercadería">Mercadería</option><option value="Servicios">Servicios</option></select>
                </div>
                <input type="tel" name="telefono" placeholder="WhatsApp (Ej: 261...)" class="uber-input" required>
                <div class="flex gap-2">
                    <button type="button" onclick="toggleModal('modal-entidad')" class="flex-1 font-bold text-xs uppercase underline">Cancelar</button>
                    <button type="submit" class="btn-black flex-1">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- ESTADO Y PERSISTENCIA ---
        let entidades = JSON.parse(localStorage.getItem('lp_entidades')) || [
            { id: 1, nombre: "Luis Grasso", tipo: "cliente", contacto: "261555000", extra: "Premium" }
        ];

        const save = () => localStorage.setItem('lp_entidades', JSON.stringify(entidades));

        // --- LOGIN LOGIC ---
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('login-email').value === "admin@localpay.com" && document.getElementById('login-pass').value === "123456") {
                localStorage.setItem('lp_session', 'active');
                document.getElementById('login-screen').classList.add('hidden');
            } else { alert("Error de acceso"); }
        };

        if(localStorage.getItem('lp_session') === 'active') document.getElementById('login-screen').classList.add('hidden');
        function logout() { localStorage.removeItem('lp_session'); location.reload(); }

        // --- TABS & UI ---
        function openTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('active');
            lucide.createIcons();
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        document.querySelectorAll('input[name="tipo"]').forEach(r => {
            r.onchange = (e) => document.getElementById('prov-fields').classList.toggle('hidden', e.target.value !== 'proveedor');
        });

        // --- ENTIDADES LOGIC ---
        function renderEntities(filter = 'todos') {
            const tbody = document.getElementById('entity-table-body');
            tbody.innerHTML = '';
            const data = filter === 'todos' ? entidades : entidades.filter(e => e.tipo === filter);
            data.forEach(e => {
                tbody.innerHTML += `<tr><td class="p-4"><p class="font-bold">${e.nombre}</p><p class="text-[9px] text-neutral-400 font-bold uppercase">${e.extra}</p></td><td class="p-4"><span class="text-[9px] font-black uppercase p-1 ${e.tipo==='cliente'?'bg-blue-50 text-blue-600':'bg-neutral-100'}">${e.tipo}</span></td><td class="p-4 text-xs font-medium">${e.contacto}</td></tr>`;
            });
            lucide.createIcons();
        }

        function filterEntities(tipo) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            event.currentTarget.classList.add('active-filter');
            renderEntities(tipo);
        }

        document.getElementById('form-entidad').onsubmit = function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            // Validación CUIT (Básica: 11 dígitos)
            if(fd.get('tipo') === 'proveedor' && fd.get('cuit').length !== 11) return alert("CUIT debe tener 11 dígitos");
            
            entidades.unshift({
                id: Date.now(),
                nombre: fd.get('nombre'),
                tipo: fd.get('tipo'),
                contacto: fd.get('telefono'),
                extra: fd.get('tipo') === 'proveedor' ? `CUIT: ${fd.get('cuit')} | ${fd.get('rubro')}` : "Cliente"
            });
            save(); renderEntities(); toggleModal('modal-entidad'); this.reset();
        };

        // --- EXPORTAR ---
        function exportToCSV() {
            let csv = "Nombre,Tipo,Contacto,Extra\n";
            entidades.forEach(e => csv += `${e.nombre},${e.tipo},${e.contacto},${e.extra}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'localpay_entidades.csv'; a.click();
        }

        // Init
        renderEntities();
        lucide.createIcons();
    </script>
    <style>.active-filter { @apply bg-black text-white; }</style>
</body>
</html>
