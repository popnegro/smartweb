<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CobroAuto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card-stats { border-left: 5px solid #009ee3; border-radius: 12px; }
        .badge-approved { background-color: #e6f4ea; color: #1e7e34; border: 1px solid #c3e6cb; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-white bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold text-primary">COBROAUTO PMV</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-stats shadow-sm p-3">
                    <small class="text-muted">TOTAL HOY</small>
                    <h2 id="totalVentas" class="fw-bold">$0</h2>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Fecha</th><th>ID Pago</th><th>Monto</th><th>Estado</th><th>Comprobante</th>
                        </tr>
                    </thead>
                    <tbody id="paymentRows">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'TU_URL_DE_GOOGLE_SHEETS_CSV_AQUÍ';

        async function updateDashboard() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                let total = 0;

                document.getElementById('paymentRows').innerHTML = rows.filter(r => r.trim()).reverse().map(row => {
                    const [fecha, id, monto] = row.split(',');
                    total += parseFloat(monto) || 0;
                    return `<tr>
                        <td>${fecha}</td>
                        <td><code>${id}</code></td>
                        <td class="fw-bold">$${monto}</td>
                        <td><span class="badge rounded-pill badge-approved">Aprobado</span></td>
                        <td><a href="https://www.mercadopago.com.ar/payments/${id.trim()}/ticket" target="_blank" class="btn btn-sm btn-outline-danger">Ver Ticket</a></td>
                    </tr>`;
                }).join('');
                document.getElementById('totalVentas').innerText = `$${total.toLocaleString('es-AR')}`;
            } catch (e) { console.error("Error", e); }
        }

        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body>
</html>
