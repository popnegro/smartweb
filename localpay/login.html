<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalPay | Acceso Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 3rem; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .form-control { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 0.8rem; transition: 0.3s; }
        .form-control:focus { background: rgba(255, 255, 255, 0.1); border-color: #3b82f6; color: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        .btn-primary { background: #2563eb; border: none; border-radius: 12px; font-weight: 700; padding: 0.9rem; transition: 0.3s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
        .brand-logo { background: #2563eb; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 18px; margin: 0 auto 1.5rem; font-size: 2rem; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <div class="brand-logo"><i class="bi bi-lightning-charge-fill text-white"></i></div>
            <h3 class="fw-bold">LocalPay Admin</h3>
            <p class="text-white-50 small mb-4">Ingresa admin@localpay.com / 123456</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="small fw-semibold mb-1 opacity-75">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="admin@tienda.com" required>
            </div>
            <div class="mb-4">
                <label class="small fw-semibold mb-1 opacity-75">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow">Iniciar Sesión</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === "admin@localpay.com" && pass === "123456") {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', 'Admin Sucursal');
                window.location.href = 'dashboard.html';
            } else { alert("Credenciales incorrectas. Intenta con admin@localpay.com / 123456"); }
        });
    </script>
</body>
</html>
