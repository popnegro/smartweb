

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva de Turno | Sistema Automatizado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
  <!-- IMask JS -->
  <script src="https://unpkg.com/imask"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-100 p-8">
  <header class="mb-8">
    <h2 class="text-2xl font-bold text-slate-800">Solicitar turno</h2>
    <p class="text-sm text-slate-500 mt-1">Completa los pasos para agendar tu cita.</p>
    
    <!-- Progress Bar -->
    <div class="mt-6">
      <div class="flex justify-between text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider text-right">
        <span id="progress-text">Paso 1 de 2</span>
        <span id="progress-percent">25%</span>
      </div>
      <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
        <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-500 ease-out" style="width: 50%"></div>
      </div>
    </div>
  </header>

<!-- STEP 1 -->
<div id="step1" class="step block">
  <div class="mb-6">
    <label class="block text-sm font-semibold text-slate-700 mb-2">¿Qué servicio necesitás?</label>
    <select id="tipo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
      <option value="Consulta general">Consulta general</option>
      <option value="Cirugía láser">Cirugía láser</option>
      <option value="Ojo seco">Ojo seco</option>
    </select>
  </div>

  <div>
    <label class="block text-left text-sm font-semibold text-slate-700 mb-2">Seleccioná fecha y hora</label>
    <input id="fecha" type="text" placeholder="Elegir fecha..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer" readonly />
  </div>

  <button onclick="next(2)" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-200">
    Continuar
  </button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step hidden">
  <div class="space-y-4">
    <input id="nombre" placeholder="Nombre completo" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
    <input id="telefono" type="tel" placeholder="+54 9 11 1234 5678" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
    <input id="email" type="email" placeholder="Email" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
    <label class="block text-left text-sm font-semibold text-slate-700 pt-2 mb-1">Sobre tu consulta (opcional)</label>
    <textarea id="mensaje" placeholder="Contanos brevemente el motivo..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none h-24"></textarea>
  </div>
  <button onclick="submitForm()" class="mt-6 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-green-200">
    Confirmar turno
  </button>
  <button onclick="next(1)" class="mt-2 w-full text-slate-400 text-sm font-medium hover:text-slate-600 py-2">Volver atrás</button>
</div>

<!-- SUCCESS -->
<div id="success" class="step hidden text-center py-8">
  <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
    </svg>
  </div>
  <h3 class="text-2xl font-bold text-slate-800">¡Solicitud enviada!</h3>
  <p class="text-slate-500 mt-2">Redirigiendo a WhatsApp para confirmar los detalles finales...</p>
</div>

</div>

<!-- Flatpickr JS & Spanish Locale -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
let current = 1 // Ahora solo hay 2 pasos principales

// Inicializar Flatpickr
const fp = flatpickr("#fecha", {
  enableTime: true,
  dateFormat: "d/m/Y H:i",
  minDate: "today",
  locale: "es",
  time_24hr: true,
  minuteIncrement: 30,
  disableMobile: "true",
  minTime: "09:00",
  maxTime: "18:00",
  disable: [
    function(date) {
      return (date.getDay() === 0 || date.getDay() === 6);
    }
  ],
  onChange: function() {
    showError('fecha', false);
  }
});

// Inicializar IMask para el teléfono (Formato Argentina)
const phoneMask = IMask(document.getElementById('telefono'), {
  mask: '+{54} 9 00 0000 0000'
});

// Limpiar errores visuales al escribir
['nombre', 'telefono', 'email'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => showError(id, false));
});

function updateProgress() {
  const percent = (current / 2) * 100 // Ajustar para 2 pasos
  document.getElementById('progress-text').innerText = `Paso ${current} de 2`
  document.getElementById('progress-percent').innerText = `${percent}%`
  document.getElementById('progress-bar').style.width = `${percent}%`
}

function showError(id, hasError) {
  const el = document.getElementById(id);
  if (hasError) {
    el.classList.add('border-red-500', 'ring-2', 'ring-red-100');
    el.classList.remove('border-slate-200');
  } else {
    el.classList.remove('border-red-500', 'ring-2', 'ring-red-100');
    el.classList.add('border-slate-200');
  }
}

function next(step) {
  if (step > current) {
    if (!validate(current)) return; // Validar el paso actual antes de avanzar
  }
  
  document.querySelectorAll('.step').forEach(s => {
    s.classList.add('hidden')
    s.classList.remove('block')
  })
  
  const nextStep = document.getElementById('step' + step)
  if (nextStep) {
    nextStep.classList.remove('hidden')
    nextStep.classList.add('block')
    current = step
    updateProgress()
  }
}

function validate(stepToValidate) { // Recibe el paso a validar
  let isValid = true;
  
  // Validar Paso 1 (Servicio y Fecha)
  if (stepToValidate === 1) {
    const fecha = document.getElementById('fecha');
    if (!fecha.value) { // La validación del tipo de servicio es implícita al tener un valor por defecto
      showError('fecha', true);
      isValid = false;
    }
  }
  
  // Validar Paso 2 (Datos personales)
  if (stepToValidate === 2) {
    const nombre = document.getElementById('nombre');
    const telefono = document.getElementById('telefono');
    const email = document.getElementById('email');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    if (!nombre.value) { showError('nombre', true); isValid = false; }
    // Valida que el teléfono exista y que la máscara esté completa
    if (!telefono.value || !phoneMask.masked.isComplete) { showError('telefono', true); isValid = false; }

    if (!email.value || !emailRegex.test(email.value)) {
      showError('email', true);
      isValid = false;
    }
    // 'mensaje' es opcional, no requiere validación aquí
  }

  return isValid;
}

function submitForm() {
  if (!validate(2)) return // Validar el Paso 2 antes de enviar
  const btn = event.target;
  btn.disabled = true;
  btn.innerText = "Procesando...";

  const newAppointment = {
    id: Date.now(), // Generar un ID único para el turno
    nombre: document.getElementById('nombre').value,
    telefono: document.getElementById('telefono').value,
    email: document.getElementById('email').value, // Incluir email
    tipo: document.getElementById('tipo').value,
    disponibilidad: document.getElementById('fecha').value, // Usar 'disponibilidad' para consistencia
    mensaje: document.getElementById('mensaje').value, // Incluir mensaje
    estado: 'nuevo' // Estado inicial del turno
  }

  // Obtener turnos existentes de LocalStorage o inicializar un array vacío
  const existingAppointments = JSON.parse(localStorage.getItem('appointmentsData')) || [];
  // Añadir el nuevo turno
  existingAppointments.push(newAppointment);
  // Guardar el array actualizado en LocalStorage
  localStorage.setItem('appointmentsData', JSON.stringify(existingAppointments));

  document.querySelectorAll('.step').forEach(s => s.classList.add('hidden'))
  document.getElementById('success').classList.remove('hidden')

  const text = `Hola! 👋 Mi nombre es ${newAppointment.nombre}. Quiero solicitar un turno para *${newAppointment.tipo}* el día *${newAppointment.disponibilidad}*.`

  setTimeout(() => {
    window.location.href = `https://wa.me/549XXXXXXXXX?text=${encodeURIComponent(text)}`
  }, 1500)
}
</script>
