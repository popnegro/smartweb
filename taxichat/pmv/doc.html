<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>MiTaxi Mendoza | Pedido Online</title>
    
    <link rel="preconnect" href="https://maps.googleapis.com">
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root{--taxi-yellow:#ffc107;--wa-green:#1f9d49;--dark:#212529}
        body{height:100dvh;margin:0;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#000}
        main{height:100%;display:flex;flex-direction:column;background:#fff}
        .map-wrapper{flex:1;position:relative;background:#f1f3f5;min-height:300px}
        #map{height:100%;width:100%}
        #map:empty{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel 1.5s infinite}
        @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .form-content{padding:20px 20px 30px;border-radius:24px 24px 0 0;margin-top:-24px;z-index:100;background:#fff;box-shadow:0 -10px 30px rgba(0,0,0,.1)}
        .input-group-custom{background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:14px;padding:5px 12px;display:flex;align-items:center;margin-bottom:12px}
        .input-group-custom:focus-within{border-color:var(--taxi-yellow);background:#fff}
        .input-group-custom input{border:none;background:transparent;width:100%;padding:8px;outline:none;font-size:16px}
        .price-panel{background:#fdfdfd;border:1px solid #eee;border-radius:18px;padding:15px;margin-bottom:15px}
        .btn-main{background:var(--wa-green);color:#fff;border:none;width:100%;height:65px;border-radius:16px;font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;gap:10px;transition:0.3s}
        .btn-main:disabled{background:#ccc;opacity:0.6}
        .btn-main.mode-help{background:transparent!important;color:#666!important;border:1px solid #ddd!important;height:50px;font-size:0.9rem;box-shadow:none!important}
        #overlay{position:fixed;inset:0;background:#fff;z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
        #brevo-conversations-widget{bottom:90px!important;right:20px!important}
        .spinning{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<main>
    <div id="overlay">
        <div class="mb-4"><i class="bi bi-taxi-front text-warning" style="font-size:4rem"></i></div>
        <h4 class="fw-bold">Procesando pedido...</h4>
        <p id="d-desc" class="text-muted small">Iniciando sistemas en Mendoza</p>
        <div class="progress w-100 mb-3" style="height:8px;border-radius:10px">
            <div id="d-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-warning" style="width:0%"></div>
        </div>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
    </div>

    <div class="form-content">
        <div class="input-group-custom">
            <i class="bi bi-geo-alt-fill text-danger me-2"></i>
            <input type="text" id="origen" placeholder="¿Dónde te buscamos?">
            <button class="border-0 bg-transparent" onclick="obtenerGPS(true)"><i class="bi bi-crosshair text-primary fs-5"></i></button>
        </div>
        <div class="input-group-custom">
            <i class="bi bi-flag-fill text-primary me-2"></i>
            <input type="text" id="destino" placeholder="¿A dónde vas?">
        </div>
        <div class="input-group-custom">
            <i class="bi bi-person-fill text-secondary me-2"></i>
            <input type="text" id="user-name" placeholder="Tu nombre">
        </div>

        <div class="price-panel d-flex justify-content-between align-items-center">
            <div>
                <span id="badge-tarifa" class="badge bg-light text-dark border mb-1" style="font-size:0.65rem">TARIFA ESTÁNDAR</span>
                <div class="small text-muted fw-bold">ESTIMADO</div>
            </div>
            <h2 id="precio-txt" class="m-0 fw-bold text-dark">$ 0</h2>
        </div>

        <button id="btn-pedido" onclick="validarYEnviar()" class="btn-main" disabled>
            <i class="bi bi-whatsapp"></i> SOLICITAR COCHE
        </button>
    </div>
</main>

<script>
    // CONFIGURACIÓN CENTRALIZADA
    const CONFIG = {
        API_KEY: "AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI", // Tu API Key de Google
        NUMERO_WA: "5492616706710",
        BREVO_ID: "69bf77ac643e0fa199040dec", // REEMPLAZAR con tu ID de Brevo Conversations
        TARIFAS: { bajada: 1450, ficha: 820, nocturno: 1.2 },
        HORA_NOC: { ini: 22, fin: 6 }
    };

    let map, marker, directionsService, directionsRenderer, geocoder, mapsLoaded = false;
    const ui = {
        origen: document.getElementById('origen'),
        destino: document.getElementById('destino'),
        nombre: document.getElementById('user-name'),
        btn: document.getElementById('btn-pedido'),
        precio: document.getElementById('precio-txt'),
        overlay: document.getElementById('overlay'),
        bar: document.getElementById('d-bar'),
        desc: document.getElementById('d-desc')
    };

    // 1. CARGA ASÍNCRONA DE GOOGLE MAPS
    function loadMaps() {
        if (mapsLoaded) return;
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.API_KEY}&libraries=places&callback=initApp&loading=async`;
        s.async = s.defer = true;
        document.head.appendChild(s);
        mapsLoaded = true;
    }

    window.initApp = () => {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 15, center: { lat: -32.8895, lng: -68.8458 },
            disableDefaultUI: true, gestureHandling: "greedy", backgroundColor: '#f1f3f5'
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map });
        geocoder = new google.maps.Geocoder();
        marker = new google.maps.Marker({ map, animation: google.maps.Animation.DROP });

        const autocompleteOpt = { componentRestrictions: { country: "ar" }, fields: ["geometry", "formatted_address"] };
        const autoO = new google.maps.places.Autocomplete(ui.origen, autocompleteOpt);
        const autoD = new google.maps.places.Autocomplete(ui.destino, autocompleteOpt);

        autoO.addListener('place_changed', () => {
            const p = autoO.getPlace();
            if (p.geometry) { map.panTo(p.geometry.location); marker.setPosition(p.geometry.location); }
            if (ui.destino.value) calcularRuta();
        });
        autoD.addListener('place_changed', calcularRuta);

        ui.nombre.value = localStorage.getItem('taxigo_name') || "";
        obtenerGPS(false);
    };

    // 2. LÓGICA DE TARIFAS Y RUTA
    function calcularRuta() {
        if (!ui.origen.value || !ui.destino.value) return;
        const hora = new Date().getHours();
        const esNocturno = (hora >= CONFIG.HORA_NOC.ini || hora < CONFIG.HORA_NOC.fin);
        
        document.getElementById('badge-tarifa').innerText = esNocturno ? "TARIFA NOCTURNA (+20%)" : "TARIFA ESTÁNDAR";

        directionsService.route({
            origin: ui.origen.value, destination: ui.destino.value, travelMode: 'DRIVING'
        }, (res, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                const m = esNocturno ? CONFIG.TARIFAS.nocturno : 1;
                const total = Math.round((CONFIG.TARIFAS.bajada * m) + (km * (CONFIG.TARIFAS.ficha * m)));
                ui.precio.innerText = `$ ${total.toLocaleString('es-AR')}`;
                ui.btn.disabled = false;
            }
        });
    }

    // 3. FLUJO DE ENVÍO Y CHAT BREVO
    function activarSoporteBrevo(datos) {
        if (window.BrevoConversationsID) return;
        (function(d, w, c) {
            w.BrevoConversationsID = CONFIG.BREVO_ID;
            w[c] = w[c] || function() { (w[c].q = w[c].q || []).push(arguments); };
            const s = d.createElement('script'); s.async = true;
            s.src = 'https://conversations-widget.brevo.com/js/sdk.js?identify=' + w.BrevoConversationsID;
            d.head.appendChild(s);
        })(document, window, 'BrevoConversations');

        window.BrevoConversations('updateIntegrationData', {
            name: datos.nombre, origin: datos.origen, price: datos.precio
        });
        setTimeout(() => window.BrevoConversations('open'), 2000);
    }

    window.validarYEnviar = () => {
        const n = ui.nombre.value.trim();
        if (n.length < 3) { alert("Ingresa tu nombre"); return; }
        localStorage.setItem('taxigo_name', n);
        
        ui.overlay.style.display = 'flex';
        let p = 0;
        const frases = [{p:0,t:"Buscando unidades..."},{p:40,t:"Sincronizando ruta..."},{p:80,t:"Abriendo WhatsApp..."}];
        
        const timer = setInterval(() => {
            p += 5; ui.bar.style.width = p + "%";
            const f = frases.findLast(x => p >= x.p);
            if(f) ui.desc.innerText = f.t;

            if (p >= 100) {
                clearInterval(timer);
                activarSoporteBrevo({ nombre: n, origen: ui.origen.value, precio: ui.precio.innerText });
                
                ui.btn.innerHTML = '<i class="bi bi-headset"></i> ¿Ayuda con tu viaje?';
                ui.btn.classList.add('mode-help');

                const urlMapa = `https://maps.google.com/{encodeURIComponent(ui.origen.value)}&destination=${encodeURIComponent(ui.destino.value)}`;
                const msj = `*NUEVO PEDIDO MITAXI*%0A👤 *Pasajero:* ${n}%0A📍 *Origen:* ${ui.origen.value}%0A🏁 *Destino:* ${ui.destino.value}%0A💰 *Estimado:* ${ui.precio.innerText}%0A%0A🗺️ *Ruta:* ${urlMapa}%0A%0A*Enviar mensaje para solicitar coche*`;

                setTimeout(() => {
                    window.open(`https://wa.me/${CONFIG.NUMERO_WA}?text=${msj}`, '_blank');
                    ui.overlay.style.display = 'none';
                }, 600);
            }
        }, 100);
    };

    window.obtenerGPS = (manual) => {
        const btnIcon = document.querySelector('.bi-crosshair');
        if(manual) btnIcon.classList.add('spinning');
        navigator.geolocation.getCurrentPosition((pos) => {
            const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(coords); marker.setPosition(coords);
            geocoder.geocode({ location: coords }, (res, status) => {
                if (status === "OK" && res[0]) ui.origen.value = res[0].formatted_address;
                if(manual) btnIcon.classList.remove('spinning');
            });
        }, () => { if(manual) btnIcon.classList.remove('spinning'); });
    };

    document.readyState === 'complete' ? loadMaps() : window.addEventListener('load', loadMaps);
</script>
</body>
</html>
