<!DOCTYPE html>
<html lang="es">
<head>
    <title>Login - Central Taxis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">🔐 Panel Admin</h2>
        <input type="email" id="email" class="w-full p-3 mb-4 border rounded-lg" placeholder="Correo Operador">
        <input type="password" id="password" class="w-full p-3 mb-6 border rounded-lg" placeholder="Contraseña">
        <button id="btn-login" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">Ingresar</button>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        
        document.getElementById('btn-login').onclick = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = "admin.html";
            } catch (error) {
                alert("Credenciales incorrectas");
            }
        };
    </script>
</body>
</html>
