<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
       .booking-widget {
    background: #ffffff;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 400px;
    font-family: 'Inter', sans-serif;
}

.widget-header h3 {
    margin-bottom: 20px;
    font-size: 1.2rem;
    font-weight: 700;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 5px;
    color: #666;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #eeeeee;
    background: #f6f6f6;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.2s;
}

.input-group input:focus {
    outline: none;
    border-color: #000;
    background: #fff;
}

.estimate-box {
    background: #e7f3ff;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    border-left: 4px solid #000;
}

.hidden { display: none; }

.btn-primary {
    width: 100%;
    padding: 15px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-primary:hover {
    background: #333;
}
    </style>
</head>
<body>

    <button id="fab" onclick="toggle(true)">🚕</button>

    <div id="panel">
        <div class="booking-widget">
    <div class="widget-header">
        <h3>Reserva tu viaje</h3>
    </div>
    <form id="booking-form">
        <div class="input-group">
            <label for="origin">Punto de partida</label>
            <input type="text" id="origin" placeholder="Ej: Aeropuerto Jorge Newbery" required>
        </div>

        <div class="input-group">
            <label for="destination">Destino</label>
            <input type="text" id="destination" placeholder="Ej: Palermo Soho" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="date">Fecha y Hora</label>
                <input type="datetime-local" id="datetime" required>
            </div>
        </div>

        <div id="price-estimate" class="estimate-box hidden">
            <p>Estimado: <strong id="price-value">$0.00</strong></p>
            <small id="distance-info">-- km / -- min</small>
        </div>

        <button type="submit" class="btn-primary">Confirmar Reserva</button>
    </form>
</div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('booking-form');
    const priceBox = document.getElementById('price-estimate');
    const priceValue = document.getElementById('price-value');
    const distanceInfo = document.getElementById('distance-info');

    // Lógica para "simular" precio cuando el usuario escribe
    const inputs = form.querySelectorAll('input[type="text"]');
    
    inputs.forEach(input => {
        input.addEventListener('blur', () => {
            const origin = document.getElementById('origin').value;
            const dest = document.getElementById('destination').value;

            if(origin && dest) {
                calculateFare(origin, dest);
            }
        });
    });

    function calculateFare(origen, destino) {
        // En una app real, aquí llamarías a Google Distance Matrix API
        // Simularemos una distancia aleatoria para la demo
        const fakeDistance = (Math.random() * 15 + 2).toFixed(1); 
        const baseFare = 500; // Precio base
        const perKm = 150;    // Precio por km
        
        const total = baseFare + (fakeDistance * perKm);

        // Mostrar resultados con suavidad
        priceBox.classList.remove('hidden');
        priceValue.textContent = `$${total.toLocaleString('es-AR')}`;
        distanceInfo.textContent = `${fakeDistance} km / ${Math.round(fakeDistance * 2.5)} min`;
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Validación de seguridad básica
        const data = {
            origin: document.getElementById('origin').value,
            destination: document.getElementById('destination').value,
            time: document.getElementById('datetime').value
        };

        console.log("Reserva enviada:", data);
        alert("¡Reserva confirmada en Smartweb Car! Nos vemos el " + data.time);
    });
});
    </script>
</body>
</html>
