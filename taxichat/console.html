<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO | Silver Admin Console</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        silver: {
                            50: '#F9FAFB', 100: '#F3F4F6', 200: '#E5E7EB',
                            300: '#D1D5DB', 400: '#9CA3AF', 500: '#6B7280',
                            600: '#4B5563', 700: '#374151', 800: '#1F2937',
                            900: '#111827', black: '#0A0A0A'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-hidden { display: none; }
        /* Estética de mapa Silver */
        .leaflet-container { filter: grayscale(1) contrast(1.1); border-radius: 1.5rem; border: 1px solid #E5E7EB; }
        /* Animación suave para stats */
        .stat-card { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .stat-card:hover { transform: translateY(-4px); border-color: #0A0A0A; }
    </style>
</head>
<body class="bg-white text-silver-900 antialiased">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-[100] px-6 py-4 border-b border-silver-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-silver-black flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-[900] tracking-tighter uppercase italic">Console <span class="text-silver-400 font-normal">CENTER</span></span>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] font-black uppercase tracking-widest text-silver-400 hover:text-silver-900 transition-colors">
                Reiniciar Métricas
            </button>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-12 px-6 max-w-7xl mx-auto">
        
        <div class="mb-12 space-y-2">
            <div class="inline-flex items-center gap-2 bg-silver-100 px-4 py-1.5 rounded-full">
                <span class="w-1.5 h-1.5 bg-silver-black rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-silver-600">Live Analytics Mendoza</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter uppercase italic text-silver-black">
                Panel de <span class="text-silver-300">Control.</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            
            <div class="stat-card p-8 bg-white border border-silver-200 rounded-[2.5rem] shadow-sm">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-[10px] font-black uppercase text-silver-400 tracking-widest">Cotizaciones</p>
                    <i data-lucide="calculator" class="w-4 h-4 text-silver-300"></i>
                </div>
                <h4 id="stat-quotes" class="text-6xl font-black italic tracking-tighter">142</h4>
            </div>

            <div class="stat-card p-8 bg-white border border-silver-200 rounded-[2.5rem] shadow-sm">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-[10px] font-black uppercase text-silver-400 tracking-widest">Pedidos WA</p>
                    <i data-lucide="message-circle" class="w-4 h-4 text-emerald-500"></i>
                </div>
                <h4 id="stat-wa" class="text-6xl font-black italic tracking-tighter text-silver-black">86</h4>
            </div>

            <div class="stat-card p-8 bg-silver-black text-white rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-[10px] font-black uppercase text-silver-400 tracking-widest">Conversión</p>
                    <i data-lucide="trending-up" class="w-4 h-4 text-silver-400"></i>
                </div>
                <h4 id="stat-conversion" class="text-6xl font-black italic tracking-tighter">60%</h4>
            </div>

            <div class="stat-card p-8 bg-silver-50 border border-silver-200 rounded-[2.5rem] shadow-sm">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-[10px] font-black uppercase text-silver-400 tracking-widest">Volumen Est.</p>
                    <i data-lucide="dollar-sign" class="w-4 h-4 text-silver-400"></i>
                </div>
                <h4 id="stat-cash" class="text-5xl font-black italic tracking-tighter text-silver-black">$54k</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white border border-silver-200 rounded-[2.5rem] overflow-hidden p-2">
                <div id="map-dashboard" class="h-[450px] w-full"></div>
            </div>
            
            <div class="bg-white border border-silver-200 rounded-[2.5rem] p-8">
                <h3 class="text-xs font-black uppercase tracking-widest text-silver-400 mb-6">Móviles Activos</h3>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-silver-50 rounded-full flex items-center justify-center border border-silver-100">
                                <i data-lucide="car" class="w-4 h-4 text-silver-900"></i>
                            </div>
                            <div>
                                <p class="text-sm font-black uppercase tracking-tighter">Móvil #101</p>
                                <p class="text-[10px] font-bold text-emerald-500 uppercase">Disponible</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-silver-300">2 min</span>
                    </div>
                    
                    <div class="flex items-center justify-between opacity-50">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-silver-50 rounded-full flex items-center justify-center border border-silver-100">
                                <i data-lucide="car" class="w-4 h-4 text-silver-400"></i>
                            </div>
                            <div>
                                <p class="text-sm font-black uppercase tracking-tighter">Móvil #204</p>
                                <p class="text-[10px] font-bold text-silver-400 uppercase">En Viaje</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-silver-300">15 min</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inicializar Iconos
        lucide.createIcons();

        // Lógica de Mapa (Adaptada al estilo Dark/Grayscale del widget)
        function initDashboardMap() {
            const map = L.map('map-dashboard', { 
                zoomControl: false, 
                attributionControl: false 
            }).setView([-32.8895, -68.8458], 13);

            // Capa de mapa clara (como la del widget público)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            const mockDrivers = [
                { id: 101, pos: [-32.889, -68.845], status: 'free' },
                { id: 204, pos: [-32.882, -68.855], status: 'busy' },
                { id: 305, pos: [-32.895, -68.835], status: 'free' }
            ];

            mockDrivers.forEach(drv => {
                // Marcador personalizado estilo minimalista
                L.circleMarker(drv.pos, {
                    radius: 8,
                    fillColor: drv.status === 'free' ? '#10b981' : '#9ca3af',
                    color: '#FFF',
                    weight: 3,
                    fillOpacity: 1
                }).addTo(map).bindTooltip(`<b class="uppercase text-[10px]">Móvil #${drv.id}</b>`);
            });
        }

        // Cargar mapa al iniciar
        window.onload = initDashboardMap;
    </script>
</body>
</html>
