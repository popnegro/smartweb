<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO | Uber Base Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.372.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'uber-black': '#000000',
                        'uber-blue': '#276EF1',
                        'uber-gray-50': '#F6F6F6',
                        'uber-gray-100': '#EEEEEE',
                        'uber-gray-600': '#6B6B6B',
                        'uber-gray-800': '#333333',
                        'uber-green': '#05A357'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #F6F6F6; color: #000000; overflow-x: hidden; }
        .uber-card { background: #FFFFFF; border: 1px solid #EEEEEE; border-radius: 0; }
        .uber-input { border: 2px solid #EEEEEE; transition: all 0.2s; border-radius: 0; background: #F6F6F6; outline: none; }
        .uber-input:focus { border-color: #000000; background: #FFFFFF; }
        .uber-btn-primary { background: #000000; color: #FFFFFF; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; border-radius: 0; }
        .uber-btn-primary:hover:not(:disabled) { background: #333; }
        .uber-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        #map { height: 280px; width: 100%; border: 1px solid #EEE; z-index: 10; }
        .suggestions-box { position: absolute; left: 0; right: 0; top: 100%; background: white; border: 1px solid #EEE; z-index: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #F6F6F6; font-size: 14px; }
        .suggestion-item:hover { background: #F6F6F6; }
        .view-hidden { display: none !important; }
        .status-pending { background: #FFEFD2; color: #735100; padding: 4px 10px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .status-active { background: #E2EBFF; color: #1E40AF; padding: 4px 10px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .status-done { background: #E3F2ED; color: #065F46; padding: 4px 10px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-uber-black text-white px-8 py-5 flex justify-between items-center sticky top-0 z-[1000]">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black tracking-tighter uppercase italic">TaxiGO</span>
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-[2px] text-uber-gray-600">
                <button onclick="switchView('widget')" class="hover:text-white">Cliente</button>
                <button onclick="switchView('admin')" class="hover:text-white">Operador</button>
            </div>
        </div>
        <div id="connection-badge" class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-red-500"></div>
            <span class="text-[9px] font-bold uppercase text-gray-400">Offline</span>
        </div>
    </nav>

    <main id="view-widget" class="max-w-xl mx-auto py-12 px-4">
        <div class="uber-card p-10 shadow-lg">
            <div class="flex gap-1 mb-10">
                <div id="bar-1" class="h-1 flex-1 bg-uber-black"></div>
                <div id="bar-2" class="h-1 flex-1 bg-uber-gray-100 transition-colors duration-500"></div>
                <div id="bar-3" class="h-1 flex-1 bg-uber-gray-100 transition-colors duration-500"></div>
            </div>

            <section id="step-1" class="space-y-6">
                <h2 class="text-3xl font-black tracking-tighter mb-8 italic uppercase">Pedir Viaje</h2>
                <div class="space-y-4">
                    <input type="text" id="custName" placeholder="Tu nombre" class="uber-input w-full p-4">
                    <div class="relative">
                        <input type="text" id="custOrigin" oninput="searchLoc(this.value, 'origin')" placeholder="Origen" class="uber-input w-full p-4 pr-12">
                        <button onclick="detectLocation()" class="absolute right-4 top-1/2 -translate-y-1/2 text-uber-blue"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
                        <div id="origin-suggestions" class="suggestions-box hidden"></div>
                    </div>
                    <div class="relative">
                        <input type="text" id="custDest" oninput="searchLoc(this.value, 'dest')" placeholder="¿A dónde vas?" class="uber-input w-full p-4">
                        <div id="dest-suggestions" class="suggestions-box hidden"></div>
                    </div>
                </div>
                <button onclick="calculateRoute()" class="uber-btn-primary w-full p-5 mt-4">Siguiente</button>
            </section>

            <section id="step-2" class="view-hidden space-y-6">
                <div id="map"></div>
                <div class="flex justify-between items-center py-4 border-b">
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Tarifa Estándar</p>
                        <h2 id="display-price" class="text-4xl font-black">$0</h2>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-gray-500">WhatsApp (10 dígitos)</label>
                    <input type="tel" id="custPhone" oninput="validatePhone(this.value)" placeholder="261XXXXXXX" class="uber-input w-full p-4 text-xl font-bold">
                    <p id="phone-error" class="text-[10px] text-red-600 font-bold hidden">10 DÍGITOS REQUERIDOS</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="bg-gray-100 flex-1 p-5 font-bold uppercase text-[10px]">Atrás</button>
                    <button id="btn-confirm" onclick="confirmOrder()" class="uber-btn-primary flex-[2] p-5 text-xs flex items-center justify-center gap-3">
                        <span id="text-confirm">Confirmar</span>
                        <i id="loader-confirm" data-lucide="loader-2" class="w-4 h-4 loader hidden"></i>
                    </button>
                </div>
            </section>

            <section id="step-3" class="view-hidden py-10 text-center">
                <div class="w-16 h-16 bg-uber-green text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <i data-lucide="check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black uppercase mb-2">Pedido Recibido</h2>
                <p class="text-gray-500 mb-8 text-sm">Buscando el móvil más cercano...</p>

                <div id="tracking-card" class="view-hidden border-2 border-uber-black p-6 mb-8 text-left bg-white shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)] transition-all duration-500">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-bold uppercase text-uber-blue tracking-widest">Unidad Asignada</p>
                            <h3 id="track-movil" class="text-3xl font-black italic tracking-tighter">--</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold uppercase text-gray-400">Demora</p>
                            <p class="text-xl font-bold"><span id="track-eta">--</span> MIN</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 pt-4 border-t border-gray-100">
                        <div class="w-2 h-2 rounded-full bg-uber-green animate-ping"></div>
                        <p class="text-[11px] font-bold uppercase tracking-tight">El conductor está en camino</p>
                    </div>
                </div>

                <button onclick="location.reload()" class="bg-gray-100 w-full p-4 text-[10px] font-bold uppercase tracking-widest">Solicitar otro móvil</button>
            </section>
        </div>
    </main>

    <main id="view-admin" class="view-hidden p-8 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h1 class="text-5xl font-black tracking-tighter uppercase italic">Despacho</h1>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-500 uppercase">Recaudación Total</p>
                <h3 id="total-cash" class="text-3xl font-black text-uber-blue">$0</h3>
            </div>
        </div>

        <div class="uber-card overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-uber-gray-50 border-b-2 border-uber-black text-[10px] font-bold uppercase text-uber-gray-600 tracking-widest">
                        <th class="px-8 py-5">Pasajero</th>
                        <th class="px-8 py-5">Estado / Móvil</th>
                        <th class="px-8 py-5">Ruta</th>
                        <th class="px-8 py-5 text-right">Tarifa</th>
                        <th class="px-8 py-5 text-center">Gestión</th>
                    </tr>
                </thead>
                <tbody id="orders-list" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </main>

    <div id="dispatch-modal" class="view-hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="uber-card w-full max-w-md p-8 shadow-2xl border-t-4 border-uber-blue">
            <h3 class="text-xl font-black uppercase italic tracking-tighter mb-6">Asignar Unidad</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-500 block mb-2">Número de Móvil</label>
                    <input type="text" id="dispatch-movil" placeholder="Unidad" class="uber-input w-full p-4 font-bold text-xl">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-500 block mb-2">ETA (Demora)</label>
                    <select id="dispatch-eta" class="uber-input w-full p-4 font-bold">
                        <option value="5">5 Minutos</option>
                        <option value="10" selected>10 Minutos</option>
                        <option value="15">15 Minutos</option>
                        <option value="20">20 Minutos</option>
                    </select>
                </div>
                <input type="hidden" id="dispatch-order-id">
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleView('dispatch-modal', false)" class="bg-gray-100 flex-1 p-4 font-bold uppercase text-[10px]">Cancelar</button>
                    <button onclick="processDispatch()" class="uber-btn-primary flex-[2] p-4 text-[10px]">Confirmar Despacho</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const $ = (id) => document.getElementById(id);
        const toggleView = (id, show) => $(id).classList[show ? 'remove' : 'add']('view-hidden');
        
        let state = { currentPrice: 0, coords: { origin: null, dest: null } };
        let leafMap, myOrderId = null, isRealtimeActive = false;

        // --- SUPABASE CREDENTIALS (REEMPLAZAR) ---
        const SB_URL = 'https://xynkbghmcioavfmvfwkm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bmtiZ2htY2lvYXZmbXZmd2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjY5OTIsImV4cCI6MjA5MTMwMjk5Mn0.HQb8_GfKpxzniW_JNp1ZXI9KvwhlSa17Lq2IfkVrVQs';
        const taxiSupabase = supabase.createClient(SB_URL, SB_KEY);

        // --- INICIO ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkConnection();
        });

        async function checkConnection() {
            try {
                const { error } = await taxiSupabase.from('pedidos').select('id').limit(1);
                if (!error) {
                    $('connection-badge').querySelector('div').classList.replace('bg-red-500', 'bg-uber-green');
                    $('connection-badge').querySelector('span').innerText = 'Online';
                }
            } catch (e) {}
        }

        function switchView(v) {
            toggleView('view-widget', v === 'widget');
            toggleView('view-admin', v === 'admin');
            if (v === 'admin') initAdminEngine();
        }

        // --- GEOLOCALIZACIÓN ---
        async function detectLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                state.coords.origin = [latitude, longitude];
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                    const data = await res.json();
                    $('custOrigin').value = data.address.road || "Ubicación Actual";
                } catch (e) { $('custOrigin').value = "Detectado"; }
            });
        }

        async function searchLoc(query, type) {
            const box = $(type === 'origin' ? 'origin-suggestions' : 'dest-suggestions');
            if (query.length < 3) return box.classList.add('hidden');
            try {
                const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&bbox=-69.0,-33.1,-68.5,-32.7&limit=4`);
                const data = await res.json();
                box.innerHTML = '';
                data.features.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = (f.properties.name || f.properties.street) + (f.properties.housenumber ? ' ' + f.properties.housenumber : '');
                    div.onclick = () => {
                        $(type === 'origin' ? 'custOrigin' : 'custDest').value = div.innerText;
                        state.coords[type] = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
                        box.classList.add('hidden');
                    };
                    box.appendChild(div);
                });
                box.classList.remove('hidden');
            } catch (e) {}
        }

        function calculateRoute() {
            if (!$('custName').value || !state.coords.origin || !state.coords.dest) return alert("Completa los datos");
            state.currentPrice = Math.max(1500, Math.round(1000 + (Math.random() * 2000)));
            $('display-price').innerText = `$${state.currentPrice.toLocaleString('es-AR')}`;
            toggleView('step-1', false);
            toggleView('step-2', true);
            $('bar-2').classList.replace('bg-uber-gray-100', 'bg-uber-black');
            setTimeout(() => {
                if (leafMap) leafMap.remove();
                leafMap = L.map('map', { zoomControl: false, attributionControl: false }).setView(state.coords.origin, 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafMap);
                const poly = L.polyline([state.coords.origin, state.coords.dest], { color: '#000', weight: 4 }).addTo(leafMap);
                leafMap.fitBounds(poly.getBounds(), { padding: [40, 40] });
            }, 300);
        }

        function validatePhone(p) {
            const clean = p.replace(/\D/g, '').substring(0, 10);
            $('custPhone').value = clean;
            const valid = clean.length === 10;
            $('phone-error').classList.toggle('hidden', valid || clean.length === 0);
            return valid;
        }

        // --- LÓGICA CLIENTE ---
        async function confirmOrder() {
            if (!validatePhone($('custPhone').value)) return;
            $('btn-confirm').disabled = true;
            $('loader-confirm').classList.remove('hidden');

            const { data, error } = await taxiSupabase.from('pedidos').insert([{
                nombre: $('custName').value,
                telefono: "549" + $('custPhone').value,
                origen: $('custOrigin').value,
                destino: $('custDest').value,
                precio: state.currentPrice,
                estado: 'pending'
            }]).select();

            if (error) {
                alert("Error: " + error.message);
                $('btn-confirm').disabled = false;
                $('loader-confirm').classList.add('hidden');
            } else {
                myOrderId = data[0].id;
                startTracking(myOrderId);
                toggleView('step-2', false);
                toggleView('step-3', true);
                $('bar-3').classList.replace('bg-uber-gray-100', 'bg-uber-black');
                lucide.createIcons();
            }
        }

        function startTracking(id) {
            taxiSupabase.channel(`track-${id}`)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pedidos', filter: `id=eq.${id}` }, payload => {
                    const p = payload.new;
                    if (p.estado === 'active' && p.movil_id) {
                        $('track-movil').innerText = `UNIDAD ${p.movil_id}`;
                        $('track-eta').innerText = p.eta_minutos;
                        toggleView('tracking-card', true);
                    }
                }).subscribe();
        }

        // --- LÓGICA OPERADOR ---
        async function initAdminEngine() {
            if (isRealtimeActive) return;
            await fetchOrders();
            taxiSupabase.channel('admin-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, () => {
                fetchOrders();
            }).subscribe();
            isRealtimeActive = true;
        }

        async function fetchOrders() {
            const { data, error } = await taxiSupabase.from('pedidos').select('*').order('created_at', { ascending: false });
            if (!error) renderTable(data);
        }

        function renderTable(pedidos) {
            const list = $('orders-list');
            let cash = 0; list.innerHTML = '';
            pedidos.forEach(o => {
                if (o.estado === 'done') cash += o.precio;
                const badge = o.movil_id ? 
    `<div class="text-[9px] font-black text-uber-blue uppercase mt-1">
        Móvil: ${o.movil_id} • ${o.eta_minutos} min
    </div>` : '';
                const btn = o.estado === 'pending' 
                    ? `<button onclick="openDispatch(${o.id})" class="status-pending animate-pulse">DESPACHAR</button>`
                    : `<button onclick="updateStatus(${o.id}, '${o.estado}')" class="status-${o.estado}">${o.estado.toUpperCase()}</button>`;
                
                list.innerHTML += `
                    <tr>
                        <td class="px-8 py-5 font-bold text-sm">${o.nombre}</td>
                        <td class="px-8 py-5">${btn}${badge}</td>
                        <td class="px-8 py-5 text-[10px] text-gray-500">${o.origen} → ${o.destino}</td>
                        <td class="px-8 py-5 text-right font-bold text-sm">$${o.precio.toLocaleString()}</td>
                        <td class="px-8 py-5 text-center">
                            <button onclick="window.open('https://wa.me/${o.telefono}')" class="text-uber-blue"><i data-lucide="message-square" class="w-5 h-5 mx-auto"></i></button>
                        </td>
                    </tr>`;
            });
            $('total-cash').innerText = `$${cash.toLocaleString('es-AR')}`;
            lucide.createIcons();
        }

        function openDispatch(id) {
            $('dispatch-order-id').value = id;
            toggleView('dispatch-modal', true);
        }

        async function processDispatch() {
            const id = $('dispatch-order-id').value;
            const movil = $('dispatch-movil').value;
            const eta = $('dispatch-eta').value;
            if (!movil) return alert("Indique móvil");
            
            await taxiSupabase.from('pedidos').update({ estado: 'active', movil_id: movil, eta_minutos: parseInt(eta) }).eq('id', id);
            toggleView('dispatch-modal', false);
        }

        async function updateStatus(id, curr) {
            const flow = { active: 'done', done: 'pending' };
            await taxiSupabase.from('pedidos').update({ estado: flow[curr] }).eq('id', id);
        }
    </script>
</body>
</html>
