<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO | Gestión de Flota & Pedidos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .view-hidden { display: none; }
        .btn-brutal { border: 3px solid black; box-shadow: 4px 4px 0px black; transition: all 0.1s; }
        .btn-brutal:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px black; }
        .card-neo { border: 3px solid black; box-shadow: 10px 10px 0px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <section id="admin-panel" class="py-20 bg-white border-t-8 border-black">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
            <div>
                <h2 class="text-5xl font-[900] uppercase italic tracking-tighter leading-none">
                    Console <span class="text-primary">Center</span>
                </h2>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mt-2">Métricas de rendimiento en tiempo real</p>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] font-black uppercase border-b-2 border-black hover:text-primary transition-colors">
                Reiniciar Métricas
            </button>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="p-8 bg-slate-50 border-2 border-black rounded-[2rem] hover:shadow-[8px_8px_0px_rgba(0,0,0,1)] transition-all">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-2">Cotizaciones</p>
                <h4 id="stat-quotes" class="text-5xl font-[900] italic leading-none">0</h4>
            </div>
            <div class="p-8 bg-slate-50 border-2 border-black rounded-[2rem] hover:shadow-[8px_8px_0px_rgba(0,0,0,1)] transition-all">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-2">Pedidos WA</p>
                <h4 id="stat-wa" class="text-5xl font-[900] italic leading-none text-green-600">0</h4>
            </div>
            <div class="p-8 bg-black text-white rounded-[2rem] shadow-xl">
                <p class="text-[10px] font-black uppercase text-primary mb-2">Conversión</p>
                <h4 id="stat-conversion" class="text-5xl font-[900] italic leading-none">0%</h4>
            </div>
            <div class="p-8 bg-primary border-2 border-black rounded-[2rem] hover:shadow-[8px_8px_0px_rgba(0,0,0,1)] transition-all">
                <p class="text-[10px] font-black uppercase text-black/50 mb-2">Volumen Est.</p>
                <h4 id="stat-cash" class="text-4xl font-[900] italic leading-none text-black">$0</h4>
            </div>
        </div>
    </div>
</section>

    <script>
        lucide.createIcons();
        let map;

        // --- Lógica de Vistas ---
        function toggleView(view) {
            document.getElementById('view-publico').classList.add('view-hidden');
            document.getElementById('view-login').classList.add('view-hidden');
            document.getElementById('view-dashboard').classList.add('view-hidden');
            document.getElementById(`view-${view}`).classList.remove('view-hidden');
        }

        function auth() {
            const pin = document.getElementById('op-code').value;
            if(pin === "2026") {
                toggleView('dashboard');
                initDashboardMap();
                lucide.createIcons();
            } else { alert("PIN Incorrecto"); }
        }

        // --- Lógica de WhatsApp ---
        function requestWA() {
            const o = document.getElementById('origin').value;
            const d = document.getElementById('dest').value;
            if(!o || !d) return alert("Por favor, completa los datos.");
            
            const text = `🚕 *TAXI GO - PEDIDO*\n📍 Origen: ${o}\n🏁 Destino: ${d}\n--- \n_Enviado desde mendoza-centro.taxigo.com.ar_`;
            window.open(`https://wa.me/5492610000000?text=${encodeURIComponent(text)}`, '_blank');
        }

        // --- Lógica de Mapa ---
        function initDashboardMap() {
            if(map) return;
            map = L.map('map-dashboard', { zoomControl: false, attributionControl: false }).setView([-32.8895, -68.8458], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Simular conductores en tiempo real (Mendoza)
            const mockDrivers = [
                { id: 101, pos: [-32.889, -68.845], status: 'free' },
                { id: 204, pos: [-32.882, -68.855], status: 'busy' }
            ];

            mockDrivers.forEach(drv => {
                L.circleMarker(drv.pos, {
                    radius: 7,
                    fillColor: drv.status === 'free' ? '#22c55e' : '#eab308',
                    color: '#000',
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map).bindTooltip(`Móvil #${drv.id}`);
            });
        }
    </script>
</body>
</html>
