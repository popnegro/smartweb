<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | MiTaxi Mendoza</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; }
        .admin-card { background: #1f2833; border: 1px solid #45a29e; border-radius: 15px; }
        .table-dark { --bs-table-bg: #1f2833; }
        .status-pendiente { color: #ffc107; font-weight: bold; }
        .btn-taxi { background: #66fcf1; color: #0b0c10; font-weight: bold; border: none; }
        .btn-taxi:hover { background: #45a29e; }
        .sidebar { border-right: 1px solid #45a29e; height: 100vh; padding: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-info fw-bold mb-4">MiTaxi Admin</h4>
            <nav class="nav flex-column">
                <a class="nav-link text-white active" href="#"><i class="bi bi-speedometer2 me-2"></i> Viajes Hoy</a>
                <a class="nav-link text-secondary" href="#"><i class="bi bi-people me-2"></i> Choferes</a>
                <a class="nav-link text-secondary" href="#"><i class="bi bi-graph-up me-2"></i> Reportes</a>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Gestión de Pedidos en Tiempo Real</h2>
                <div id="connection-status" class="badge bg-success small">Conectado a Firebase</div>
            </div>

            <div class="card admin-card p-3">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Pasajero</th>
                                <th>Origen / Destino</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-pedidos">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "tu-proyecto.firebaseapp.com",
        databaseURL: "https://tu-proyecto.firebaseio.com",
        projectId: "tu-proyecto",
        storageBucket: "tu-proyecto.appspot.com",
        messagingSenderId: "12345",
        appId: "tu-id"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Escuchar nuevos pedidos
    const pedidosRef = ref(db, 'solicitudes');
    onValue(pedidosRef, (snapshot) => {
        const data = snapshot.val();
        renderizarPedidos(data);
    });

    function renderizarPedidos(pedidos) {
        const tbody = document.getElementById('lista-pedidos');
        tbody.innerHTML = '';
        
        for (let id in pedidos) {
            const p = pedidos[id];
            const row = `
                <tr>
                    <td>${new Date(p.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td>${p.nombre}</td>
                    <td>
                        <small class="d-block text-info">O: ${p.origen}</small>
                        <small class="d-block text-secondary">D: ${p.destino}</small>
                    </td>
                    <td><span class="status-pendiente">${p.status}</span></td>
                    <td>
                        <button class="btn btn-taxi btn-sm" onclick="aceptarViaje('${id}', '${p.visitorId}')">
                            <i class="bi bi-check-lg"></i> Asignar
                        </button>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('afterbegin', row);
        }
    }

    // Función para aceptar y notificar via Brevo
    window.aceptarViaje = async (pedidoId, visitorId) => {
        // 1. Cambiar estado en Firebase
        update(ref(db, 'solicitudes/' + pedidoId), { status: 'Asignado' });

        // 2. Notificar al cliente via Brevo (Conversations API)
        if(visitorId) {
            await fetch('https://api.brevo.com/v3/conversations/messages', {
                method: 'POST',
                headers: { 'api-key': 'TU_API_KEY_BREVO', 'content-type': 'application/json' },
                body: JSON.stringify({
                    visitorId: visitorId,
                    text: "🚕 ¡Tu MiTaxi ha sido asignado! El chofer está en camino."
                })
            });
            alert("Notificación enviada al chat del cliente.");
        }
    };
</script>
</body>
</html>
