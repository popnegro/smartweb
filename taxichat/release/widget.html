<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Widget Pro</title>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .step-hidden { display: none; }
        .active-ring { ring: 4px; ring-color: rgba(250, 204, 21, 0.2); border-color: #facc15; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #map { height: 260px; border-radius: 1.5rem; z-index: 10; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-transparent p-2">

    <div class="max-w-[420px] mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
        
        <header id="widget-header" class="bg-yellow-400 p-8 transition-all duration-500">
            <div class="flex justify-between items-center text-black">
                <div class="space-y-1">
                    <h1 class="font-[900] text-2xl tracking-tighter uppercase italic flex items-center gap-2">
                        <i data-lucide="taxi" class="w-6 h-6 stroke-[3]"></i> TAXIGO
                    </h1>
                    <p id="status-text" class="text-[10px] font-black uppercase tracking-widest opacity-80">Mendoza Online</p>
                </div>
                <div class="flex gap-1.5" id="nav-dots">
                    <div class="w-6 h-1.5 rounded-full bg-black transition-all"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-black/20 transition-all"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-black/20 transition-all"></div>
                </div>
            </div>
        </header>

        <div class="p-8">
            <section id="step-1" class="fade-in space-y-6">
                <div class="space-y-4">
                    <div class="group">
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">Pasajero</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="userName" placeholder="Nombre para el chofer" 
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none font-bold text-sm focus:bg-white focus:border-yellow-400 transition-all">
                        </div>
                    </div>

                    <div class="group">
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">Recogida</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <i data-lucide="map-pin" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input type="text" id="origin" placeholder="Calle y altura" 
                                class="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none font-bold text-sm focus:bg-white focus:border-yellow-400 transition-all">
                            </div>
                            <button onclick="getLocation()" class="bg-black text-white px-5 rounded-2xl active:scale-90 transition-all shadow-lg shadow-slate-200">
                                <i data-lucide="locate" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="group relative">
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">Destino</label>
                        <div class="relative">
                            <i data-lucide="navigation" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="destination" oninput="searchMendoza(this.value)" placeholder="¿A dónde vas?" 
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none font-bold text-sm focus:bg-white focus:border-yellow-400 transition-all">
                        </div>
                        <div id="results" class="absolute w-full mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 z-[100] hidden overflow-hidden divide-y divide-slate-50 custom-scroll max-h-48 overflow-y-auto"></div>
                    </div>
                </div>

                <button onclick="toStep2()" class="w-full bg-black text-white font-[900] py-5 rounded-2xl shadow-xl hover:shadow-yellow-400/20 transition-all uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-2 mt-4">
                    Cotizar Viaje <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
            </section>

            <section id="step-2" class="step-hidden fade-in space-y-6">
                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 text-center relative">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Costo Estimado</p>
                    <h3 id="display-price" class="text-5xl font-[900] text-slate-900 my-1 tracking-tighter">$0</h3>
                    <div class="inline-flex items-center gap-1.5 bg-green-100 text-green-700 px-3 py-1 rounded-full text-[9px] font-black uppercase">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Tarifa Garantizada
                    </div>
                </div>

                <div id="map"></div>

                <div class="space-y-3">
                    <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-2xl shadow-lg hover:bg-[#1faa52] transition-all flex items-center justify-center gap-3 active:scale-95">
                        PEDIR POR WHATSAPP <i data-lucide="message-circle" class="fill-white w-5 h-5"></i>
                    </button>
                    <button onclick="changeStep(1)" class="w-full py-2 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-black">Corregir datos</button>
                </div>
            </section>

            <section id="step-3" class="step-hidden fade-in text-center space-y-8 py-4">
                <div class="relative inline-block">
                    <div class="absolute inset-0 bg-green-100 rounded-full animate-ping opacity-25"></div>
                    <div class="relative bg-green-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-xl">
                        <i data-lucide="check" class="text-white w-10 h-10 stroke-[4]"></i>
                    </div>
                </div>

                <div class="space-y-2">
                    <h2 class="text-3xl font-[900] text-slate-900 tracking-tighter uppercase italic leading-none">¡Viaje Iniciado!</h2>
                    <div id="eta-box" class="text-sm font-bold text-slate-500">Tu taxi llegará en <span class="text-yellow-600">6 - 8 min</span></div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="shareTrip()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 text-xs uppercase tracking-widest">
                        <i data-lucide="share-2" class="w-4 h-4"></i> Compartir Trayecto
                    </button>
                    <a href="https://g.page/r/your-id/review" target="_blank" class="w-full border-2 border-slate-100 text-slate-900 font-black py-4 rounded-2xl flex items-center justify-center gap-3 text-xs uppercase tracking-widest hover:bg-slate-50 transition-all">
                        <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500"></i> Calificar Servicio
                    </a>
                </div>

                <button onclick="resetWidget()" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] pt-4 hover:text-yellow-600 transition-colors">Nuevo Pedido</button>
            </section>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let map, polyline, userData = { start: null, end: null, price: 0 };
        const MZA_BOUNDS = "-69.0436,-33.1092,-68.6416,-32.7483";

        // Inicialización y Cache de Nombre
        window.onload = () => {
            const savedName = localStorage.getItem('taxigo_name');
            if(savedName) document.getElementById('userName').value = savedName;
        };

        async function getLocation() {
            const btn = document.querySelector('button[onclick="getLocation()"]');
            btn.classList.add('animate-pulse');
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                userData.start = [latitude, longitude];
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('origin').value = data.address.road || "Ubicación detectada";
                btn.classList.remove('animate-pulse');
            });
        }

        async function searchMendoza(query) {
            const results = document.getElementById('results');
            if(query.length < 3) return results.classList.add('hidden');
            
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&viewbox=${MZA_BOUNDS}&bounded=1&countrycodes=ar&limit=4`);
            const data = await res.json();
            
            results.innerHTML = '';
            results.classList.remove('hidden');
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 hover:bg-yellow-50 cursor-pointer transition-colors text-xs font-bold";
                div.innerHTML = `<div class="text-slate-900">${item.display_name.split(',')[0]}</div><div class="text-[10px] opacity-40 uppercase">${item.display_name.split(',')[1]}</div>`;
                div.onclick = () => {
                    document.getElementById('destination').value = item.display_name.split(',')[0];
                    userData.end = [parseFloat(item.lat), parseFloat(item.lon)];
                    results.classList.add('hidden');
                };
                results.appendChild(div);
            });
        }

        function toStep2() {
            const name = document.getElementById('userName').value;
            if(!name || !userData.end) return alert("Completa todos los campos");
            
            localStorage.setItem('taxigo_name', name);
            userData.price = Math.floor(Math.random() * (3500 - 1800) + 1800);
            document.getElementById('display-price').innerText = `$${userData.price}`;
            
            changeStep(2);
            setTimeout(initMap, 400);
        }

        function initMap() {
            if(map) map.remove();
            const start = userData.start || [-32.8895, -68.8458];
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(start, 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            L.marker(start).addTo(map);
            L.marker(userData.end).addTo(map);
            
            polyline = L.polyline([start, userData.end], {color: '#000', weight: 4, dashArray: '10, 10'}).addTo(map);
            map.fitBounds(polyline.getBounds(), { padding: [40, 40] });
        }

        function sendToWhatsApp() {
            const msg = `🚕 *NUEVO PEDIDO TAXIGO*\n👤 *Pasajero:* ${localStorage.getItem('taxigo_name')}\n📍 *Desde:* ${document.getElementById('origin').value}\n🏁 *Hacia:* ${document.getElementById('destination').value}\n💰 *Estimado:* $${userData.price}`;
            window.open(`https://wa.me/5492610000000?text=${encodeURIComponent(msg)}`, '_blank');
            changeStep(3);
        }

        function shareTrip() {
            if (navigator.share) {
                navigator.share({
                    title: 'Mi Viaje TaxiGO',
                    text: `Voy en camino hacia ${document.getElementById('destination').value}. Seguime!`,
                    url: window.location.href
                });
            }
        }

        function changeStep(s) {
            [1,2,3].forEach(n => document.getElementById(`step-${n}`).classList.add('step-hidden'));
            document.getElementById(`step-${s}`).classList.remove('step-hidden');
            
            const dots = document.getElementById('nav-dots').children;
            Array.from(dots).forEach((dot, i) => {
                dot.className = (i === (s-1)) ? "w-6 h-1.5 rounded-full bg-black" : "w-1.5 h-1.5 rounded-full bg-black/20";
            });

            const header = document.getElementById('widget-header');
            if(s === 3) header.className = "bg-green-500 p-8 transition-all duration-500";
            else header.className = "bg-yellow-400 p-8 transition-all duration-500";
        }

        function resetWidget() {
            location.reload();
        }
    </script>
</body>
</html>
