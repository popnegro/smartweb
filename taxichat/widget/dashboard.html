<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho Mendoza - Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        @media (min-width: 1024px) { body { flex-direction: row; } }

        .main-panel { flex: 1; padding: 20px; overflow-y: auto; }
        .side-panel { width: 100%; background: #cbd5e1; padding: 15px; border-top: 5px solid var(--accent); }
        @media (min-width: 1024px) { .side-panel { width: 420px; border-top: none; border-left: 5px solid var(--accent); } }

        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .stat-card div { font-size: 1.6rem; font-weight: bold; color: var(--accent); }

        /* Estilos Tabla Desktop */
        table { width: 100%; border-collapse: collapse; background: var(--card); display: none; border-radius: 12px; overflow: hidden; }
        @media (min-width: 768px) { table { display: table; } }
        th { background: #334155; padding: 15px; text-align: left; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #334155; vertical-align: top; }

        /* Estilos Cards Mobile (Collapse) */
        .mobile-list { display: flex; flex-direction: column; gap: 12px; }
        @media (min-width: 768px) { .mobile-list { display: none; } }
        .order-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .order-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .order-content { max-height: 0; overflow: hidden; transition: 0.3s ease-out; background: #161e2e; }
        .order-card.active .order-content { max-height: 500px; padding: 15px; border-top: 1px solid #334155; }

        .reply-box { display: flex; gap: 8px; margin-top: 10px; }
        .reply-input { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; flex: 1; }
        .btn-send { background: var(--accent); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; background: var(--accent); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-panel">
    <h1>🚖 Central Despacho</h1>
    <div class="metrics">
        <div class="stat-card"><small>PEDIDOS</small><div id="t-orders">0</div></div>
        <div class="stat-card"><small>TOTAL</small><div id="t-rev">$0</div></div>
    </div>

    <table id="dt-table">
        <thead><tr><th>Pasajero</th><th>Ruta</th><th>Tarifa</th><th>Acción</th></tr></thead>
        <tbody id="list-desktop"></tbody>
    </table>

    <div id="list-mobile" class="mobile-list"></div>
</div>

<div class="side-panel">
    <iframe src="widget.html" id="w-frame"></iframe>
</div>

<script>
    let rev = 0; let count = 0;

    window.addEventListener("message", (e) => {
        if (e.data.type === "NEW_ORDER") {
            const p = e.data.payload;
            count++; rev += parseInt(p.price);
            document.getElementById('t-orders').innerText = count;
            document.getElementById('t-rev').innerText = `$${rev.toLocaleString()}`;
            renderOrder(p);
        }
    });

    function renderOrder(p) {
        const qO = encodeURIComponent(p.origin);
        const qD = encodeURIComponent(p.dest);
        const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${qO}&destination=${qD}`;

        // Render Desktop
        const dtBody = document.getElementById('list-desktop');
        const row = document.createElement('tr');
        row.id = `dt-${p.id}`;
        row.innerHTML = `<td><strong>${p.passenger}</strong></td><td><small>📍 ${p.origin}<br>🏁 ${p.dest}</small><br><a href="${mapUrl}" target="_blank" style="color:#38bdf8; font-size:0.7rem">Ver Mapa</a></td><td>$${p.price}</td><td><div class="reply-box" id="act-dt-${p.id}"><input type="text" class="reply-input" id="in-dt-${p.id}" placeholder="Móvil..."><button class="btn-send" onclick="send('${p.id}', '${p.passenger}', 'dt')">OK</button></div></td>`;
        dtBody.prepend(row);

        // Render Mobile
        const mbList = document.getElementById('list-mobile');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.id = `mb-${p.id}`;
        card.innerHTML = `<div class="order-header" onclick="toggleCard('${p.id}')"><div><span style="font-weight:bold">${p.passenger}</span><br><span class="badge" id="badge-${p.id}">Pendiente</span></div><span style="color:#22c55e;font-weight:bold">$${p.price}</span></div><div class="order-content">📍 ${p.origin}<br>🏁 ${p.dest}<br><a href="${mapUrl}" target="_blank" style="color:#38bdf8;display:block;margin:10px 0">Abrir GPS</a><div class="reply-box" id="act-mb-${p.id}"><input type="text" class="reply-input" id="in-mb-${p.id}" placeholder="Móvil..."><button class="btn-send" onclick="send('${p.id}', '${p.passenger}', 'mb')">Enviar</button></div></div>`;
        mbList.prepend(card);
    }

    function toggleCard(id) {
        document.getElementById(`mb-${id}`).classList.toggle('active');
    }

    function send(id, name, type) {
        const msg = document.getElementById(`in-${type}-${id}`).value;
        if(!msg) return alert("Ingresa datos");
        document.getElementById('w-frame').contentWindow.postMessage({ type: "DISPATCH_CONFIRM", message: `Hola ${name}, ${msg}` }, "*");
        document.getElementById(`act-dt-${id}`).innerHTML = `<span style="color:#22c55e">✓ ${msg}</span>`;
        document.getElementById(`act-mb-${id}`).innerHTML = `<span style="color:#22c55e">✓ ${msg}</span>`;
        const badge = document.getElementById(`badge-${id}`);
        if(badge) { badge.innerText = "Asignado"; badge.style.background = "#22c55e"; badge.style.color = "#fff"; }
    }
</script>
</body>
</html>
