<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho Mendoza - Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        @media (min-width: 1024px) { body { flex-direction: row; } }
        .main-panel { flex: 1; padding: 20px; overflow-y: auto; }
        .side-panel { width: 100%; background: #cbd5e1; padding: 15px; border-top: 5px solid var(--accent); }
        @media (min-width: 1024px) { .side-panel { width: 420px; border-top: none; border-left: 5px solid var(--accent); } }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .order-card { background: var(--card); border: 1px solid #334155; border-radius: 8px; margin-bottom: 10px; padding: 15px; }
        iframe { width: 100%; height: 550px; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="main-panel">
    <h1>🚖 Central Despacho Vercel</h1>
    <div id="stats" class="stat-card">Pedidos hoy: <span id="count">0</span></div>
    <div id="list"></div>
</div>

<div class="side-panel">
    <iframe src="/widget" id="w-frame"></iframe>
</div>

<script>
    window.addEventListener("message", (e) => {
        if (e.data.type === "NEW_ORDER") {
            const p = e.data.payload;
            const container = document.getElementById('list');
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <strong>${p.passenger}</strong><br>
                <small>De: ${p.origin}<br>A: ${p.dest}</small><br>
                <input type="text" id="in-${p.id}" placeholder="Móvil..." style="margin-top:10px">
                <button onclick="send('${p.id}', '${p.passenger}')">Asignar</button>
            `;
            container.prepend(card);
        }
    });

    function send(id, name) {
        const msg = document.getElementById(`in-${id}`).value;
        document.getElementById('w-frame').contentWindow.postMessage({
            type: "DISPATCH_CONFIRM",
            message: msg
        }, "*");
    }
</script>
</body>
</html>
