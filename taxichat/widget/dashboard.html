<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Despacho Mendoza - Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .panel { flex: 1; padding: 30px; overflow-y: auto; }
        .sidebar { width: 400px; background: #e2e8f0; padding: 20px; border-left: 4px solid var(--accent); }
        .metrics { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat { background: var(--card); padding: 20px; border-radius: 12px; flex: 1; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #334155; padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; }
        td { padding: 15px; border-bottom: 1px solid #334155; vertical-align: top; }
        .reply-box { display: flex; gap: 8px; }
        .reply-input { background: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; flex: 1; }
        .btn-dispatch { background: var(--accent); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 600px; border: none; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        a:hover { text-decoration: underline !important; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🚖 Central Mendoza: Despacho Pro</h1>
    <div class="metrics">
        <div class="stat"><small>VIAJES HOY</small><div id="t-orders" style="font-size: 1.8rem; font-weight: bold; color: var(--accent);">0</div></div>
        <div class="stat"><small>RECAUDACIÓN</small><div id="t-rev" style="font-size: 1.8rem; font-weight: bold;">$0</div></div>
    </div>

    <table>
        <thead>
            <tr><th>Pasajero</th><th>Detalle de Ruta</th><th>Precio</th><th>Respuesta Operador</th></tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<div class="sidebar">
    <p style="text-align: center; color: #475569; font-weight: bold; font-size: 0.8rem; margin-bottom: 15px;">VISTA CLIENTE</p>
    <iframe src="widget-two.html" id="w-frame"></iframe>
</div>

<script>
    let rev = 0; let count = 0;

    window.addEventListener("message", (e) => {
        if (e.data.type === "NEW_ORDER") {
            const p = e.data.payload;
            count++; rev += parseInt(p.price);
            document.getElementById('t-orders').innerText = count;
            document.getElementById('t-rev').innerText = `$${rev.toLocaleString()}`;
            renderPedido(p);
        }
    });

    function renderPedido(data) {
        const list = document.getElementById('list');
        const row = document.createElement('tr');
        row.id = `row-${data.id}`;
        
        const urlOrigin = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.origin)}`;
        const urlDest = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.dest)}`;
        const urlRoute = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(data.origin)}&destination=${encodeURIComponent(data.dest)}&travelmode=driving`;

        row.innerHTML = `
            <td><strong style="font-size: 1rem; color: #fff;">${data.passenger}</strong></td>
            <td>
                <div style="line-height: 1.8;">
                    <a href="${urlOrigin}" target="_blank" style="color: #fbbf24; text-decoration: none; font-size: 0.85rem; display: block;">
                        📍 RECOGIDA: ${data.origin}
                    </a>
                    <a href="${urlDest}" target="_blank" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: block;">
                        🏁 DESTINO: ${data.dest}
                    </a>
                    <a href="${urlRoute}" target="_blank" style="color: #38bdf8; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; text-decoration: none; margin-top: 5px; display: inline-block;">
                        🗺️ Ver ruta y tráfico en tiempo real
                    </a>
                </div>
            </td>
            <td><span style="font-weight: bold; color: #22c55e;">$${data.price}</span></td>
            <td>
                <div class="reply-box" id="act-${data.id}">
                    <input type="text" class="reply-input" id="in-${data.id}" placeholder="Móvil 45 llega en 4 min">
                    <button class="btn-dispatch" onclick="send('${data.id}', '${data.passenger}')">RESPONDER</button>
                </div>
            </td>
        `;
        list.prepend(row);
    }

    function send(id, name) {
        const msg = document.getElementById(`in-${id}`).value;
        if(!msg) return alert("Escribe los datos del móvil");

        const fullMsg = `Hola ${name}, ${msg}`;
        document.getElementById('w-frame').contentWindow.postMessage({
            type: "DISPATCH_CONFIRM",
            message: fullMsg
        }, "*");

        document.getElementById(`act-${id}`).innerHTML = 
            `<div style="color:#22c55e; font-weight:bold; font-size: 0.8rem; border: 1px solid #22c55e; padding: 5px; border-radius: 4px; text-align: center;">✓ ASIGNADO:<br>${msg.toUpperCase()}</div>`;
    }
</script>
</body>
</html>
