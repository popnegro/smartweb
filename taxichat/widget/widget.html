<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Widget</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="input-group"><input type="text" id="origin" placeholder="Origen"></div>
        <div class="input-group"><input type="text" id="destination" placeholder="Destino"></div>
        <div class="input-group"><input type="text" id="passenger_name" placeholder="Tu nombre"></div>
        <button onclick="enviar()">Confirmar Pedido</button>
    </div>
    <div id="status"></div>

    <script>
        // Cargar Maps dinámicamente desde el backend de Vercel
        async function init() {
            const res = await fetch('/api/config');
            const { mapsKey } = await res.json();
            
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&libraries=places`;
            script.onload = () => {
                new google.maps.places.Autocomplete(document.getElementById('origin'));
                new google.maps.places.Autocomplete(document.getElementById('destination'));
            };
            document.head.appendChild(script);
        }

        function enviar() {
            const payload = {
                id: Date.now(),
                passenger: document.getElementById('passenger_name').value,
                origin: document.getElementById('origin').value,
                dest: document.getElementById('destination').value
            };
            window.parent.postMessage({ type: "NEW_ORDER", payload }, "*");
            document.getElementById('ui').style.display = 'none';
            document.getElementById('status').innerText = "Enviando...";
        }

        window.addEventListener("message", (e) => {
            if (e.data.type === "DISPATCH_CONFIRM") {
                document.getElementById('status').innerText = "Asignado: " + e.data.message;
            }
        });

        init();
    </script>
</body>
</html>
